<script>
const DATA={"domains": [{"id": 1, "name": "Physiology Foundations", "short": "Physiology", "accent": "#2563EB", "sections": {"abridged": {"title": "Abridged snapshot", "html": "<p><strong>Physiology Foundations</strong> is the CTICU domain covering cardiac cycle, preload, afterload, contractility, Frank-Starling, oxygen delivery, oxygen consumption and mixed venous saturation. For a fresh post-cardiac surgery patient, the safest bedside method is to convert each concept into a question: what is the patient doing, why is it happening, what number or waveform confirms it, and what action will change the physiology without making another system worse?</p><p>The practical threshold is pattern recognition. A single value may mislead; a pattern such as falling MAP, narrowing pulse pressure, rising CVP, rising lactate, low urine output and cool peripheries is clinically meaningful even before every investigation is complete.</p><div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Concept / variable</th><th>Number or bedside range</th><th>CTICU interpretation</th></tr></thead><tbody><tr><td>Cardiac output</td><td>4–8 L/min; CI 2.5–4.0 L/min/m²</td><td>Flow, not pressure. Concern if CI <2.2 with hypoperfusion.</td></tr><tr><td>Preload</td><td>CVP often 6–12 mmHg post-op; PAOP 6–12 mmHg</td><td>Filling pressure estimate; high does not equal well-filled.</td></tr><tr><td>Afterload</td><td>SVR 800–1200 dyn·s/cm⁵; PVR 20–130 dyn·s/cm⁵</td><td>Load against ventricular ejection.</td></tr><tr><td>Contractility</td><td>No single bedside number</td><td>Falls with ischaemia, stunning, acidosis, hypocalcaemia and hypothermia.</td></tr><tr><td>SvO₂</td><td>60–80%</td><td>Balance of DO₂ and VO₂; low means extraction is high or delivery is low.</td></tr></tbody></table></div><div class='callout remember'><div class='callout-label'>Remember</div><p>Physiology knowledge is only useful if it changes your next bedside check. Link every number to perfusion, rhythm, bleeding, oxygenation, device function and the surgical context.</p></div>"}, "expanded": {"title": "Expanded deep-dive", "html": "<p><strong>Mechanism</strong> — in this domain, mechanism means understanding the causal chain behind the displayed number or observed sign. In CTICU, the patient is often affected by cardiopulmonary bypass, surgical manipulation, bleeding, hypothermia, electrolyte disturbance, vasoactive drugs and changing intrathoracic pressure at the same time.</p><p>For physiology, the first interpretation step is to ask whether the signal is true. A damped arterial trace, misplaced ECG lead, blocked chest drain, wrong pacing connection, contaminated blood gas or incorrectly levelled transducer can create a false problem or hide a real one. Equipment validation comes before escalation based on numbers.</p><p>The second step is to identify whether the dominant problem is <strong>preload</strong>, <strong>afterload</strong>, <strong>contractility</strong>, <strong>rate/rhythm</strong>, <strong>oxygen content</strong>, <strong>ventilation</strong>, <strong>bleeding</strong>, or <strong>obstruction</strong>. This prevents reflexive treatment: not every low blood pressure needs fluid; not every low urine output needs diuresis; not every lactate rise means sepsis; not every paced complex produces useful cardiac output.</p><p>The third step is to define the immediate nursing action. Actions include correcting transducer setup, calling for senior review, preparing pacing or defibrillation, quantifying drain output, correcting K⁺/Mg²⁺/ionised Ca²⁺, sending ABG/coagulation tests, preparing blood products, changing ventilator support, or preparing for echo/theatre depending on the pattern.</p><div class='callout warning'><div class='callout-label'>Warning</div><p>In physiology, avoid treating isolated numbers. In post-cardiac surgery, pressure can be maintained while flow is poor, drain output can fall because a clot blocks the tube, and a monitor can show a rhythm that has no mechanical output.</p></div>"}, "pearls": {"title": "Clinical pearls", "html": "<div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>Trend beats snapshot. The change over 15–60 minutes often tells you more than the first value after theatre.</p></div><div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>Always ask whether the patient's operation changes the target. Post-CABG, post-valve, aortic surgery, RV failure and cardiogenic shock do not share identical haemodynamic priorities.</p></div><div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>When a number changes abruptly, check patient first, then signal/device, then physiology. This order prevents both delayed rescue and inappropriate treatment.</p></div><div class='callout warning'><div class='callout-label'>Warning</div><p>If the patient looks worse and the monitor looks reassuring, trust the patient enough to reassess the monitor setup and escalate.</p></div>"}, "equipment": {"title": "Equipment tie-in", "html": "<p><strong>Equipment tie-in</strong> — physiology requires reliable device setup. Trace lines and cables, verify labels, confirm alarm limits, and correlate device output with the patient. The nurse technician lens is to decide whether the device is measuring correctly, delivering therapy correctly, and alarming for the right reason.</p><div class='steps'><div class='step'><div class='step-num'>1</div><div class='step-body'>Confirm identity and baseline: operation, time from theatre, airway/ventilation, rhythm, vasoactives, drains, pacing wires and current targets.</div></div><div class='step'><div class='step-num'>2</div><div class='step-body'>Validate signals: arterial line level/zero/waveform, ECG lead quality, CVP/PA waveform, SpO₂ pleth, EtCO₂, ventilator values and chest drain function.</div></div><div class='step'><div class='step-num'>3</div><div class='step-body'>Interrogate therapy devices: pacing mode/output/sensitivity, defibrillator readiness, IABP timing/trigger/ratio, infusion pump dose and chest drain suction or digital settings.</div></div><div class='step'><div class='step-num'>4</div><div class='step-body'>Document the trend and escalate with exact numbers: MAP, HR/rhythm, drain output per hour, UO, lactate/base excess, vasoactive dose, temperature and the change that worries you.</div></div></div>"}, "targets": {"title": "Targets and numbers", "html": "<div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Target / item</th><th>Specific number</th><th>Action meaning</th></tr></thead><tbody><tr><td>Cardiac output</td><td>4–8 L/min; CI 2.5–4.0 L/min/m²</td><td>Flow, not pressure. Concern if CI <2.2 with hypoperfusion.</td></tr><tr><td>Preload</td><td>CVP often 6–12 mmHg post-op; PAOP 6–12 mmHg</td><td>Filling pressure estimate; high does not equal well-filled.</td></tr><tr><td>Afterload</td><td>SVR 800–1200 dyn·s/cm⁵; PVR 20–130 dyn·s/cm⁵</td><td>Load against ventricular ejection.</td></tr><tr><td>Contractility</td><td>No single bedside number</td><td>Falls with ischaemia, stunning, acidosis, hypocalcaemia and hypothermia.</td></tr><tr><td>SvO₂</td><td>60–80%</td><td>Balance of DO₂ and VO₂; low means extraction is high or delivery is low.</td></tr><tr><td>MAP</td><td>65–85 mmHg for many post-op patients; individualise</td><td>Pressure target must be matched to flow and surgical risk.</td></tr><tr><td>Urine output</td><td>>0.5 mL/kg/h</td><td>Low output may be low flow, congestion, obstruction, AKI or hypovolaemia.</td></tr><tr><td>Lactate</td><td><2 mmol/L or falling by 10–20% every 2–4 h</td><td>Rising trend with acidosis/perfusion signs is dangerous.</td></tr><tr><td>K⁺ / Mg²⁺ / iCa²⁺</td><td>K⁺ 4.0–4.5; Mg²⁺ ≥0.8–1.0; iCa²⁺ 1.1–1.3</td><td>Electrical stability, contractility and coagulation.</td></tr></tbody></table></div>"}}}, {"id": 2, "name": "Haemodynamic Monitoring", "short": "Monitoring", "accent": "#0891B2", "sections": {"abridged": {"title": "Abridged snapshot", "html": "<p><strong>Haemodynamic Monitoring</strong> is the CTICU domain covering arterial waveform interpretation, damping, transducer setup, CVP waveforms, PA catheter data, thermodilution and derived parameters. For a fresh post-cardiac surgery patient, the safest bedside method is to convert each concept into a question: what is the patient doing, why is it happening, what number or waveform confirms it, and what action will change the physiology without making another system worse?</p><p>The practical threshold is pattern recognition. A single value may mislead; a pattern such as falling MAP, narrowing pulse pressure, rising CVP, rising lactate, low urine output and cool peripheries is clinically meaningful even before every investigation is complete.</p><div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Concept / variable</th><th>Number or bedside range</th><th>CTICU interpretation</th></tr></thead><tbody><tr><td>Arterial line</td><td>Level, zero, square-wave test</td><td>A 10 cm level error changes pressure by about 7.4 mmHg.</td></tr><tr><td>Overdamping</td><td>Slurred upstroke, low systolic, absent notch</td><td>Check clot, bubbles, kinks, loose connections, catheter position.</td></tr><tr><td>Underdamping</td><td>Ringing, overshoot, multiple oscillations</td><td>Exaggerates systolic pressure.</td></tr><tr><td>CVP waveform</td><td>a, c, v waves</td><td>Absent a in AF; large v in TR; cannon a in AV dissociation.</td></tr><tr><td>PA catheter</td><td>PA 15–30/4–12; PAOP 6–12</td><td>Wedge briefly only, then deflate.</td></tr></tbody></table></div><div class='callout remember'><div class='callout-label'>Remember</div><p>Monitoring knowledge is only useful if it changes your next bedside check. Link every number to perfusion, rhythm, bleeding, oxygenation, device function and the surgical context.</p></div>"}, "expanded": {"title": "Expanded deep-dive", "html": "<p><strong>Mechanism</strong> — in this domain, mechanism means understanding the causal chain behind the displayed number or observed sign. In CTICU, the patient is often affected by cardiopulmonary bypass, surgical manipulation, bleeding, hypothermia, electrolyte disturbance, vasoactive drugs and changing intrathoracic pressure at the same time.</p><p>For monitoring, the first interpretation step is to ask whether the signal is true. A damped arterial trace, misplaced ECG lead, blocked chest drain, wrong pacing connection, contaminated blood gas or incorrectly levelled transducer can create a false problem or hide a real one. Equipment validation comes before escalation based on numbers.</p><p>The second step is to identify whether the dominant problem is <strong>preload</strong>, <strong>afterload</strong>, <strong>contractility</strong>, <strong>rate/rhythm</strong>, <strong>oxygen content</strong>, <strong>ventilation</strong>, <strong>bleeding</strong>, or <strong>obstruction</strong>. This prevents reflexive treatment: not every low blood pressure needs fluid; not every low urine output needs diuresis; not every lactate rise means sepsis; not every paced complex produces useful cardiac output.</p><p>The third step is to define the immediate nursing action. Actions include correcting transducer setup, calling for senior review, preparing pacing or defibrillation, quantifying drain output, correcting K⁺/Mg²⁺/ionised Ca²⁺, sending ABG/coagulation tests, preparing blood products, changing ventilator support, or preparing for echo/theatre depending on the pattern.</p><div class='callout warning'><div class='callout-label'>Warning</div><p>In monitoring, avoid treating isolated numbers. In post-cardiac surgery, pressure can be maintained while flow is poor, drain output can fall because a clot blocks the tube, and a monitor can show a rhythm that has no mechanical output.</p></div>"}, "pearls": {"title": "Clinical pearls", "html": "<div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>Trend beats snapshot. The change over 15–60 minutes often tells you more than the first value after theatre.</p></div><div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>Always ask whether the patient's operation changes the target. Post-CABG, post-valve, aortic surgery, RV failure and cardiogenic shock do not share identical haemodynamic priorities.</p></div><div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>When a number changes abruptly, check patient first, then signal/device, then physiology. This order prevents both delayed rescue and inappropriate treatment.</p></div><div class='callout warning'><div class='callout-label'>Warning</div><p>If the patient looks worse and the monitor looks reassuring, trust the patient enough to reassess the monitor setup and escalate.</p></div>"}, "equipment": {"title": "Equipment tie-in", "html": "<p><strong>Equipment tie-in</strong> — monitoring requires reliable device setup. Trace lines and cables, verify labels, confirm alarm limits, and correlate device output with the patient. The nurse technician lens is to decide whether the device is measuring correctly, delivering therapy correctly, and alarming for the right reason.</p><div class='steps'><div class='step'><div class='step-num'>1</div><div class='step-body'>Confirm identity and baseline: operation, time from theatre, airway/ventilation, rhythm, vasoactives, drains, pacing wires and current targets.</div></div><div class='step'><div class='step-num'>2</div><div class='step-body'>Validate signals: arterial line level/zero/waveform, ECG lead quality, CVP/PA waveform, SpO₂ pleth, EtCO₂, ventilator values and chest drain function.</div></div><div class='step'><div class='step-num'>3</div><div class='step-body'>Interrogate therapy devices: pacing mode/output/sensitivity, defibrillator readiness, IABP timing/trigger/ratio, infusion pump dose and chest drain suction or digital settings.</div></div><div class='step'><div class='step-num'>4</div><div class='step-body'>Document the trend and escalate with exact numbers: MAP, HR/rhythm, drain output per hour, UO, lactate/base excess, vasoactive dose, temperature and the change that worries you.</div></div></div>"}, "targets": {"title": "Targets and numbers", "html": "<div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Target / item</th><th>Specific number</th><th>Action meaning</th></tr></thead><tbody><tr><td>Arterial line</td><td>Level, zero, square-wave test</td><td>A 10 cm level error changes pressure by about 7.4 mmHg.</td></tr><tr><td>Overdamping</td><td>Slurred upstroke, low systolic, absent notch</td><td>Check clot, bubbles, kinks, loose connections, catheter position.</td></tr><tr><td>Underdamping</td><td>Ringing, overshoot, multiple oscillations</td><td>Exaggerates systolic pressure.</td></tr><tr><td>CVP waveform</td><td>a, c, v waves</td><td>Absent a in AF; large v in TR; cannon a in AV dissociation.</td></tr><tr><td>PA catheter</td><td>PA 15–30/4–12; PAOP 6–12</td><td>Wedge briefly only, then deflate.</td></tr><tr><td>MAP</td><td>65–85 mmHg for many post-op patients; individualise</td><td>Pressure target must be matched to flow and surgical risk.</td></tr><tr><td>Urine output</td><td>>0.5 mL/kg/h</td><td>Low output may be low flow, congestion, obstruction, AKI or hypovolaemia.</td></tr><tr><td>Lactate</td><td><2 mmol/L or falling by 10–20% every 2–4 h</td><td>Rising trend with acidosis/perfusion signs is dangerous.</td></tr><tr><td>K⁺ / Mg²⁺ / iCa²⁺</td><td>K⁺ 4.0–4.5; Mg²⁺ ≥0.8–1.0; iCa²⁺ 1.1–1.3</td><td>Electrical stability, contractility and coagulation.</td></tr></tbody></table></div>"}}}, {"id": 3, "name": "Cardiac Conditions and Rhythms", "short": "Rhythms", "accent": "#DC2626", "sections": {"abridged": {"title": "Abridged snapshot", "html": "<p><strong>Cardiac Conditions and Rhythms</strong> is the CTICU domain covering STEMI/NSTEMI, post-operative AF, SVT, VT, VF, heart blocks, junctional rhythms, paced rhythms, tamponade and low-output syndrome. For a fresh post-cardiac surgery patient, the safest bedside method is to convert each concept into a question: what is the patient doing, why is it happening, what number or waveform confirms it, and what action will change the physiology without making another system worse?</p><p>The practical threshold is pattern recognition. A single value may mislead; a pattern such as falling MAP, narrowing pulse pressure, rising CVP, rising lactate, low urine output and cool peripheries is clinically meaningful even before every investigation is complete.</p><div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Concept / variable</th><th>Number or bedside range</th><th>CTICU interpretation</th></tr></thead><tbody><tr><td>STEMI</td><td>ST elevation in contiguous leads</td><td>Treat as acute coronary occlusion; CABG patients may have graft failure/spasm.</td></tr><tr><td>Post-op AF</td><td>Common 24–72 h post-op</td><td>Loss of atrial kick can collapse preload-dependent patients.</td></tr><tr><td>VT/VF</td><td>Unstable VT cardiovert; VF/pulseless VT defibrillate</td><td>Pads on early; do not delay shock.</td></tr><tr><td>Complete heart block</td><td>AV dissociation, slow escape</td><td>Pacing readiness, capture and sensing checks.</td></tr><tr><td>Tamponade</td><td>Rising CVP, falling MAP, narrow pulse pressure</td><td>Drain output may fall if clotted; urgent escalation.</td></tr></tbody></table></div><div class='callout remember'><div class='callout-label'>Remember</div><p>Rhythms knowledge is only useful if it changes your next bedside check. Link every number to perfusion, rhythm, bleeding, oxygenation, device function and the surgical context.</p></div>"}, "expanded": {"title": "Expanded deep-dive", "html": "<p><strong>Mechanism</strong> — in this domain, mechanism means understanding the causal chain behind the displayed number or observed sign. In CTICU, the patient is often affected by cardiopulmonary bypass, surgical manipulation, bleeding, hypothermia, electrolyte disturbance, vasoactive drugs and changing intrathoracic pressure at the same time.</p><p>For rhythms, the first interpretation step is to ask whether the signal is true. A damped arterial trace, misplaced ECG lead, blocked chest drain, wrong pacing connection, contaminated blood gas or incorrectly levelled transducer can create a false problem or hide a real one. Equipment validation comes before escalation based on numbers.</p><p>The second step is to identify whether the dominant problem is <strong>preload</strong>, <strong>afterload</strong>, <strong>contractility</strong>, <strong>rate/rhythm</strong>, <strong>oxygen content</strong>, <strong>ventilation</strong>, <strong>bleeding</strong>, or <strong>obstruction</strong>. This prevents reflexive treatment: not every low blood pressure needs fluid; not every low urine output needs diuresis; not every lactate rise means sepsis; not every paced complex produces useful cardiac output.</p><p>The third step is to define the immediate nursing action. Actions include correcting transducer setup, calling for senior review, preparing pacing or defibrillation, quantifying drain output, correcting K⁺/Mg²⁺/ionised Ca²⁺, sending ABG/coagulation tests, preparing blood products, changing ventilator support, or preparing for echo/theatre depending on the pattern.</p><div class='callout warning'><div class='callout-label'>Warning</div><p>In rhythms, avoid treating isolated numbers. In post-cardiac surgery, pressure can be maintained while flow is poor, drain output can fall because a clot blocks the tube, and a monitor can show a rhythm that has no mechanical output.</p></div>"}, "pearls": {"title": "Clinical pearls", "html": "<div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>Trend beats snapshot. The change over 15–60 minutes often tells you more than the first value after theatre.</p></div><div class='c O, lactate/base excess, vasoactive dose, temperature and the change that worries you.</div></div></div>"}, "targets": {"title": "Targets and numbers", "html": "<div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Target / item</th><th>Specific number</th><th>Action meaning</th></tr></thead><tbody><tr><td>STEMI</td><td>ST elevation in contiguous leads</td><td>Treat as acute coronary occlusion; CABG patients may have graft failure/spasm.</td></tr><tr><td>Post-op AF</td><td>Common 24–72 h post-op</td><td>Loss of atrial kick can collapse preload-dependent patients.</td></tr><tr><td>VT/VF</td><td>Unstable VT cardiovert; VF/pulseless VT defibrillate</td><td>Pads on early; do not delay shock.</td></tr><tr><td>Complete heart block</td><td>AV dissociation, slow escape</td><td>Pacing readiness, capture and sensing checks.</td></tr><tr><td>Tamponade</td><td>Rising CVP, falling MAP, narrow pulse pressure</td><td>Drain output may fall if clotted; urgent escalation.</td></tr><tr><td>MAP</td><td>65–85 mmHg for many post-op patients; individualise</td><td>Pressure target must be matched to flow and surgical risk.</td></tr><tr><td>Urine output</td><td>>0.5 mL/kg/h</td><td>Low output may be low flow, congestion, obstruction, AKI or hypovolaemia.</td></tr><tr><td>Lactate</td><td><2 mmol/L or falling by 10–20% every 2–4 h</td><td>Rising trend with acidosis/perfusion signs is dangerous.</td></tr><tr><td>K⁺ / Mg²⁺ / iCa²⁺</td><td>K⁺ 4.0–4.5; Mg²⁺ ≥0.8–1.0; iCa²⁺ 1.1–1.3</td><td>Electrical stability, contractility and coagulation.</td></tr></tbody></table></div>"}}}, {"id": 4, "name": "Devices and Mechanical Support", "short": "Devices", "accent": "#7C3AED", "sections": {"abridged": {"title": "Abridged snapshot", "html": "<p><strong>Devices and Mechanical Support</strong> is the CTICU domain covering epicardial, transvenous and transcutaneous pacing, demand/fixed pacing, sensing, capture, threshold testing, cardioversion, defibrillation, IABP, ECMO and VADs. F /p></div><div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>When a number changes abruptly, check patient first, then signal/device, then physiology. This order prevents both delayed rescue and inappropriate treatment.</p></div><div class='callout warning'><div class='callout-label'>Warning</div><p>If the patient looks worse and the monitor looks reassuring, trust the patient enough to reassess the monitor setup and escalate.</p></div>"}, "equipment": {"title": "Equipment tie-in", "html": "<p><strong>Equipment tie-in</strong> — surgery requires reliable device setup. Trace lines and cables, verify labels, confirm alarm limits, and correlate device output with the patient. The nurse technician lens is to decide whether the device is measuring correctly, delivering therapy correctly, and alarming for the right reason.</p><div class='steps'><div class='step'><div class='step-num'>1</div><div class='step-body'>Confirm identity and baseline: operation, time from theatre, airway/ventilation, rhythm, vasoactives, drains, pacing wires and current targets.</div></div><div class='step'><div class='step-num'>2</div><div class='step-body'>Validate signals: arterial line level/zero/waveform, ECG lead quality, CVP/PA waveform, SpO₂ pleth, EtCO₂, ventilator values and chest drain function.</div></div><div class='step'><div class='step-num'>3</div><div class='step-body'>Interrogate therapy devices: pacing mode/output/sensitivity, defibrillator readiness, IABP timing/trigger/ratio, infusion pump dose and chest drain suction or digital settings.</div></div><div class='step'><div class='step-num'>4</div><div class='step-body'>Document the trend and escalate with exact numbers: MAP, HR/rhythm, drain output per hour, UO, lactate/base excess, vasoactive dose, temperature and the change that worries you.</div></div></div>"}, "targets": {"title": "Targets and numbers", "html": "<div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Target / item</th><th>Specific number</th><th>Action meaning</th></tr></thead><tbody><tr><td>CABG</td><td>On-pump or off-pump grafting</td><td>Watch graft ischaemia, bleeding, AF and LCOS.</td></tr><tr><td>Valve surgery</td><td>Sudden loading-condition change</td><td>Sinus rhythm and preload often critical after stenotic valves.</td></tr><tr><td>TAVI</td><td>Large-bore access, conduction risk</td><td>Watch heart block, stroke, vascular injury, leak.</td></tr><tr><td>CPB effects</td><td>Inflammation, haemodilution, platelet dysfunction</td><td>Explains vasoplegia, coagulopathy and capillary leak.</td></tr><tr><td>First 4 h</td><td>Trend drains, lactate, UO, temp, rhythm, vasoactives</td><td>Direction matters more than a single number.</td></tr><tr><td>MAP</td><td>65–85 mmHg for many post-op patients; individualise</td><td>Pressure target must be matched to flow and surgical risk.</td></tr><tr><td>Urine output</td><td>>0.5 mL/kg/h</td><td>Low output may be low flow, congestion, obstruction, AKI or hypovolaemia.</td></tr><tr><td>Lactate</td><td><2 mmol/L or falling by 10–20% every 2–4 h</td><td>Rising trend with acidosis/perfusion signs is dangerous.</td></tr><tr><td>K⁺ / Mg²⁺ / iCa²⁺</td><td>K⁺ 4.0–4.5; Mg²⁺ ≥0.8–1.0; iCa²⁺ 1.1–1.3</td><td>Electrical stability, contractility and coagulation.</td></tr></tbody></table></div>"}}}, {"id": 6, "name": "Pharmacology", "short": "Pharmacology", "accent": "#D97706", "sections": {"abridged": {"title": "Abridged snapshot", "html": "<p><strong>Pharmacology</strong> in CTICU is targeted haemodynamic manipulation. Before titrating any drug, define whether the problem is pressure, flow, rate, rhythm, bleeding, oxygen delivery, afterload, preload, contractility, sedation, or measurement error.</p><div class='table-wrap'><table class='clinical-table drug-table'><thead><tr><th>Drug</th><th>Class / dose range</th><th>Haemodynamic effect</th><th>Nursing considerations</th></tr></thead><tbody><tr><td>Noradrenaline</td><td>α/β vasopressor; 0.02–1 mcg/kg/min</td><td>↑SVR and MAP with mild β1 effect</td><td>Central line preferred; watch excessive afterload, digital ischaemia, extravasation.</td></tr><tr><td>Adrenaline</td><td>Inopressor; 0.01–0.5 mcg/kg/min</td><td>↑contractility, ↑HR, ↑MAP</td><td>Raises lactate/glucose; arrhythmia and myocardial oxygen demand risk.</td></tr><tr><td>Dobutamine</td><td>β1 inotrope; 2–20 mcg/kg/min</td><td>↑contractility; may ↓SVR</td><td>May drop BP; watch AF/VT and tachycardia.</td></tr><tr><td>Milrinone</td><td>PDE-3 inhibitor; 0.125–0.75 mcg/kg/min</td><td>↑inotropy/lusitropy; ↓PVR/SVR</td><td>Useful RV failure; hypotension; reduce in renal impairment.</td></tr><tr><td>Vasopressin</td><td>V1 vasopressor; 0.01–0.04 units/min</td><td>↑SVR in vasoplegia</td><td>Watch ischaemia and low-flow states.</td></tr><tr><td>Levosimendan</td><td>Calcium sensitiser; unit-specific dosing</td><td>↑contractility with vasodilation</td><td>Long effect; hypotension can persist.</td></tr><tr><td>GTN</td><td>Nitrate; 5–200 mcg/min</td><td>Venodilation, coronary dilation</td><td>Headache, hypotension, tolerance.</td></tr><tr><td>SNP</td><td>NO donor; 0.2–10 mcg/kg/min</td><td>Potent arterial/venous dilation</td><td>Cyanide/thiocyanate risk; invasive BP required.</td></tr><tr><td>Metoprolol</td><td>β1 blocker; IV 1–5 mg increments or enteral</td><td>↓HR, ↓contractility</td><td>Avoid in shock, severe brady/block, acute decompensated failure.</td></tr></tbody></table></div><div class='callout warning'><div class='callout-label'>Warning</div><p>A MAP that improves after vasopressor escalation can still be harmful if cardiac output falls. Reassess pulse pressure, skin, urine output, lactate, SvO₂/ScvO₂ and echo/CO data where available.</p></div>"}, "expanded": {"title": "Expanded deep-dive", "html": "<p><strong>Mechanism</strong> — in this domain, mechanism means understanding the causal chain behind the displayed number or observed sign. In CTICU, the patient is often affected by cardiopulmonary bypass, surgical manipulation, bleeding, hypothermia, electrolyte disturbance, vasoactive drugs and changing intrathoracic pressure at the same time.</p><p>For pharmacology, the first interpretation step is to ask whether the signal is true. A damped arterial trace, misplaced ECG lead, blocked chest drain, wrong pacing connection, contaminated blood gas or incorrectly levelled transducer can create a false problem or hide a real one. Equipment validation comes before escalation based on numbers.</p><p>The second step is to identify whether the dominant problem is <strong>preload</strong>, <strong>afterload</strong>, <strong>contractility</strong>, <strong>rate/rhythm</strong>, <strong>oxygen content</strong>, <strong>ventilation</strong>, <strong>bleeding</strong>, or <strong>obstruction</strong>. This prevents reflexive treatment: not every low blood pressure needs fluid; not every low urine output needs diuresis; not every lactate rise means sepsis; not every paced complex produces useful cardiac output.</p><p>The third step is to define the immediate nursing action. Actions include correcting transducer setup, calling for senior review, preparing pacing or defibrillation, quantifying drain output, correcting K⁺/Mg²⁺/ionised Ca²⁺, sending ABG/coagulation tests, preparing blood products, changing ventilator support, or preparing for echo/theatre depending on the pattern.</p><div class='callout warning'><div class='callout-label'>Warning</div><p>In pharmacology, avoid treating isolated numbers. In post-cardiac surgery, pressure can be maintained while flow is poor, drain output can fall because a clot blocks the tube, and a monitor can show a rhythm that has no mechanical output.</p></div>"}, "pearls": {"title": "Clinical pearls", "html": "<div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>Trend beats snapshot. The change over 15–60 minutes often tells you more than the first value after theatre.</p></div><div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>Always ask whether the patient's operation changes the target. Post-CABG, post-valve, aortic surgery, RV failure and cardiogenic shock do not share identical haemodynamic priorities.</p></div><div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>When a number changes abruptly, check patient first, then signal/device, then physiology. This order prevents both delayed rescue and inappropriate treatment.</p></div><div class='callout warning'><div class='callout-label'>Warning</div><p>If the patient looks worse and the monitor looks reassuring, trust the patient enough to reassess the monitor setup and escalate.</p></div>"}, "equipment": {"title": "Equipment tie-in", "html": "<p><strong>Equipment tie-in</strong> — pharmacology requires reliable device setup. Trace lines and cables, verify labels, confirm alarm limits, and correlate device output with the patient. The nurse technician lens is to decide whether the device is measuring correctly, delivering therapy correctly, and alarming for the right reason.</p><div class='steps'><div class='step'><div class='step-num'>1</div><div class='step-body'>Confirm identity and baseline: operation, time from theatre, airway/ventilation, rhythm, vasoactives, drains, pacing wires and current targets.</div></div><div class='step'><div class='step-num'>2</div><div class='step-body'>Validate signals: arterial line level/zero/waveform, ECG lead quality, CVP/PA waveform, SpO₂ pleth, EtCO₂, ventilator values and chest drain function.</div></div><div class='step'><div class='step-num'>3</div><div class='step-body'>Interrogate therapy devices: pacing mode/output/sensitivity, defibrillator readiness, IABP timing/trigger/ratio, infusion pump dose and chest drain suction or digital settings.</div></div><div class='step'><div class='step-num'>4</div><div class='step-body'>Document the trend and escalate with exact numbers: MAP, HR/rhythm, drain output per hour, UO, lactate/base excess, vasoactive dose, temperature and the change that worries you.</div></div></div>"}, "targets": {"title": "Targets and numbers", "html": "<div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Target / item</th><th>Specific number</th><th>Action meaning</th></tr></thead><tbody><tr><td>Noradrenaline</td><td>0.02–1 mcg/kg/min</td><td>α vasopressor; raises SVR/MAP; excess afterload can reduce flow.</td></tr><tr><td>Adrenaline</td><td>0.01–0.5 mcg/kg/min</td><td>Inopressor; raises contractility/HR; raises lactate and arrhythmia risk.</td></tr><tr><td>Dobutamine</td><td>2–20 mcg/kg/min</td><td>Inotrope; may vasodilate; can cause tachyarrhythmias.</td></tr><tr><td>Milrinone</td><td>0.125–0.75 mcg/kg/min</td><td>PDE-3 inhibitor; improves inotropy/lusitropy and lowers PVR/SVR.</td></tr><tr><td>Vasopressin</td><td>0.01–0.04 units/min</td><td>V1 vasopressor for vasoplegia; watch ischaemia and low-flow states.</td></tr><tr><td>MAP</td><td>65–85 mmHg for many post-op patients; individualise</td><td>Pressure target must be matched to flow and surgical risk.</td></tr><tr><td>Urine output</td><td>>0.5 mL/kg/h</td><td>Low output may be low flow, congestion, obstruction, AKI or hypovolaemia.</td></tr><tr><td>Lactate</td><td><2 mmol/L or falling by 10–20% every 2–4 h</td><td>Rising trend with acidosis/perfusion signs is dangerous.</td></tr><tr><td>K⁺ / Mg²⁺ / iCa²⁺</td><td>K⁺ 4.0–4.5; Mg²⁺ ≥0.8–1.0; iCa²⁺ 1.1–1.3</td><td>Electrical stability, contractility and coagulation.</td></tr></tbody></table></div>"}}}, {"id": 7, "name": "Post-op Care and Complications", "short": "Post-op Care", "accent": "#DB2777", "sections": {"abridged": {"title": "Abridged snapshot", "html": "<p><strong>Post-op Care and Complications</strong> is the CTICU domain covering chest drains, sternal wound care, pressure injury prevention, VAP bundle, extubation and major post-op complications. For a fresh post-cardiac surgery patient, the safest bedside method is to convert each concept into a question: what is the patient doing, why is it happening, what number or waveform confirms it, and what action will change the physiology without making another system worse?</p><p>The practical threshold is pattern recognition. A single value may mislead; a pattern such as falling MAP, narrowing pulse pressure, rising CVP, rising lactate, low urine output and cool peripheries is clinically meaningful even before every investigation is complete.</p><div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Concept / variable</th><th>Number or bedside range</th><th>CTICU interpretation</th></tr></thead><tbody><tr><td>Drain output</td><td>>200 mL/h or persistent >100–150 mL/h is concerning</td><td>Quantify exactly, check colour/clots, escalate.</td></tr><tr><td>Tamponade</td><td>Rising CVP + falling MAP + narrowing pulse pressure</td><td>Low drain output can be bad if drain is blocked.</td></tr><tr><td>Extubation</td><td>RR <30, RSBI <105, FiO₂ ≤0.4–0.5, PEEP 5–8</td><td>Also needs haemodynamic, neuro and bleeding readiness.</td></tr><tr><td>AKI</td><td>UO <0.5 mL/kg/h</td><td>Could be low flow, venous congestion, obstruction or nephrotoxins.</td></tr><tr><td>Sternal wound</td><td>Pain, click, discharge, fever, instability</td><td>Mediastinitis/dehiscence needs urgent review.</td></tr></tbody></table></div><div class='callout remember'><div class='callout-label'>Remember</div><p>Post-op Care knowledge is only useful if it changes your next bedside check. Link every number to perfusion, rhythm, bleeding, oxygenation, device function and the surgical context.</p></div>"}, "expanded": {"title": "Expanded deep-dive", "html": "<p><strong>Mechanism</strong> — in this domain, mechanism means understanding the causal chain behind the displayed number or observed sign. In CTICU, the patient is often affected by cardiopulmonary bypass, surgical manipulation, bleeding, hypothermia, electrolyte disturbance, vasoactive drugs and changing intrathoracic pressure at the same time.</p><p>For post-op care, the first interpretation step is to ask whether the signal is true. A damped arterial trace, misplaced ECG lead, blocked chest drain, wrong pacing connection, contaminated blood gas or incorrectly levelled transducer can create a false problem or hide a real one. Equipment validation comes before escalation based on numbers.</p><p>The second step is to identify whether the dominant problem is <strong>preload</strong>, <strong>afterload</strong>, <strong>contractility</strong>, <strong>rate/rhythm</strong>, <strong>oxygen content</strong>, <strong>ventilation</strong>, <strong>bleeding</strong>, or <strong>obstruction</strong>. This prevents reflexive treatment: not every low blood pressure needs fluid; not every low urine output needs diuresis; not every lactate rise means sepsis; not every paced complex produces useful cardiac output.</p><p>The third step is to define the immediate nursing action. Actions include correcting transducer setup, calling for senior review, preparing pacing or defibrillation, quantifying drain output, correcting K⁺/Mg²⁺/ionised Ca²⁺, sending ABG/coagulation tests, preparing blood products, changing ventilator support, or preparing for echo/theatre depending on the pattern.</p><div class='callout warning'><div class='callout-label'>Warning</div><p>In post-op care, avoid treating isolated numbers. In post-cardiac surgery, pressure can be maintained while flow is poor, drain output can fall because a clot blocks the tube, and a monitor can show a rhythm that has no mechanical output.</p></div>"}, "pearls": {"title": "Clinical pearls", "html": "<div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>Trend beats snapshot. The change over 15–60 minutes often tells you more than the first value after theatre.</p></div><div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>Always ask whether the patient's operation changes the target. Post-CABG, post-valve, aortic surgery, RV failure and cardiogenic shock do not share identical haemodynamic priorities.</p></div><div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>When a number changes abruptly, check patient first, then signal/device, then physiology. This order prevents both delayed rescue and inappropriate treatment.</p></div><div class='callout warning'><div class='callout-label'>Warning</div><p>If the patient looks worse and the monitor looks reassuring, trust the patient enough to reassess the monitor setup and escalate.</p></div>"}, "equipment": {"title": "Equipment tie-in", "html": "<p><strong>Equipment tie-in</strong> — post-op care requires reliable device setup. Trace lines and cables, verify labels, confirm alarm limits, and correlate device output with the patient. The nurse technician lens is to decide whether the device is measuring correctly, delivering therapy correctly, and alarming for the right reason.</p><div class='steps'><div class='step'><div class='step-num'>1</div><div class='step-body'>Confirm identity and baseline: operation, time from theatre, airway/ventilation, rhythm, vasoactives, drains, pacing wires and current targets.</div></div><div class='step'><div class='step-num'>2</div><div class='step-body'>Validate signals: arterial line level/zero/waveform, ECG lead quality, CVP/PA waveform, SpO₂ pleth, EtCO₂, ventilator values and chest drain function.</div></div><div class='step'><div class='step-num'>3</div><div class='step-body'>Interrogate therapy devices: pacing mode/output/sensitivity, defibrillator readiness, IABP timing/trigger/ratio, infusion pump dose and chest drain suction or digital settings.</div></div><div class='step'><div class='step-num'>4</div><div class='step-body'>Document the trend and escalate with exact numbers: MAP, HR/rhythm, drain output per hour, UO, lactate/base excess, vasoactive dose, temperature and the change that worries you.</div></div></div>"}, "targets": {"title": "Targets and numbers", "html": "<div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Target / item</th><th>Specific number</th><th>Action meaning</th></tr></thead><tbody><tr><td>Drain output</td><td>>200 mL/h or persistent >100–150 mL/h is concerning</td><td>Quantify exactly, check colour/clots, escalate.</td></tr><tr><td>Tamponade</td><td>Rising CVP + falling MAP + narrowing pulse pressure</td><td>Low drain output can be bad if drain is blocked.</td></tr><tr><td>Extubation</td><td>RR <30, RSBI <105, FiO₂ ≤0.4–0.5, PEEP 5–8</td><td>Also needs haemodynamic, neuro and bleeding readiness.</td></tr><tr><td>AKI</td><td>UO <0.5 mL/kg/h</td><td>Could be low flow, venous congestion, obstruction or nephrotoxins.</td></tr><tr><td>Sternal wound</td><td>Pain, click, discharge, fever, instability</td><td>Mediastinitis/dehiscence needs urgent review.</td></tr><tr><td>MAP</td><td>65–85 mmHg for many post-op patients; individualise</td><td>Pressure target must be matched to flow and surgical risk.</td></tr><tr><td>Urine output</td><td>>0.5 mL/kg/h</td><td>Low output may be low flow, congestion, obstruction, AKI or hypovolaemia.</td></tr><tr><td>Lactate</td><td><2 mmol/L or falling by 10–20% every 2–4 h</td><td>Rising trend with acidosis/perfusion signs is dangerous.</td></tr><tr><td>K⁺ / Mg²⁺ / iCa²⁺</td><td>K⁺ 4.0–4.5; Mg²⁺ ≥0.8–1.0; iCa²⁺ 1.1–1.3</td><td>Electrical stability, contractility and coagulation.</td></tr></tbody></table></div>"}}}, {"id": 8, "name": "Equipment Mastery", "short": "Equipment", "accent": "#0369A1", "sections": {"abridged": {"title": "Abridged snapshot", "html": "<p><strong>Equipment Mastery</strong> is the CTICU domain covering ventilators, haemodynamic monitors, cardiac monitors, defibrillators, IABP machines, pacing boxes, chest drain systems and point-of-care testing. For a fresh post-cardiac surgery patient, the safest bedside method is to convert each concept into a question: what is the patient doing, why is it happening, what number or waveform confirms it, and what action will change the physiology without making another system worse?</p><p>The practical threshold is pattern recognition. A single value may mislead; a pattern such as falling MAP, narrowing pulse pressure, rising CVP, rising lactate, low urine output and cool peripheries is clinically meaningful even before every investigation is complete.</p><div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Concept / variable</th><th>Number or bedside range</th><th>CTICU interpretation</th></tr></thead><tbody><tr><td>A/C ventilation</td><td>Mandatory and patient-triggered breaths get full support</td><td>Useful early post-op or when control needed.</td></tr><tr><td>PSV/CPAP</td><td>Spontaneous modes requiring drive</td><td>Useful for weaning; watch fatigue and apnea.</td></tr><tr><td>Defibrillator</td><td>VF/pulseless VT: unsynchronised. Organised unstable rhythm: synchronised.</td><td>Confirm sync markers before cardioversion.</td></tr><tr><td>POCT ABG</td><td>No air bubbles, no line contamination, run promptly</td><td>Bad samples create bad treatment.</td></tr><tr><td>IABP console</td><td>Trigger, timing, ratio, augmentation, helium, limb checks</td><td>Timing errors can worsen shock.</td></tr></tbody></table></div><div class='callout remember'><div class='callout-label'>Remember</div><p>Equipment knowledge is only useful if it changes your next bedside check. Link every number to perfusion, rhythm, bleeding, oxygenation, device function and the surgical context.</p></div>"}, "expanded": {"title": "Expanded deep-dive", "html": "<p><strong>Ventilator modes</strong> define patient-machine interaction. A/C gives mandatory support for set and triggered breaths. SIMV gives set mandatory breaths and allows spontaneous breaths between them. PSV supports spontaneous breaths and requires drive. CPAP maintains baseline pressure and is used for spontaneous breathing or weaning depending on device setup.</p><p><strong>Ventilator alarms</strong> are patient alarms until disproven. High pressure means obstruction, coughing, secretions, bronchospasm, reduced compliance, pneumothorax, pulmonary oedema or kink. Low pressure or low minute volume means leak, disconnection, apnea, cuff issue or low drive.</p><p><strong>Defibrillator operation</strong> is rhythm-dependent. VF/pulseless VT requires unsynchronised shock. Organised unstable tachyarrhythmia with a pulse requires synchronised cardioversion, with sync markers visible on R waves before shock. Re-check sync after every shock.</p><p><strong>POCT</strong> is only as good as the sample. ABG errors come from air bubbles, line contamination, venous sampling, delayed analysis, excess heparin and poor mixing. ACT/iSTAT/TEG/ROTEM each require correct cartridge/cup/sample handling and interpretation against the clinical pattern.</p><div class='callout warning'><div class='callout-label'>Warning</div><p>A critically abnormal POCT result that does not fit the patient should be repeated from a clean sample while the patient is assessed. Do not ignore it, but do not blindly treat a contaminated specimen.</p></div>"}, "pearls": {"title": "Clinical pearls", "html": "<div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>Trend beats snapshot. The change over 15–60 minutes often tells you more than the first value after theatre.</p></div><div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>Always ask whether the patient's operation changes the target. Post-CABG, post-valve, aortic surgery, RV failure and cardiogenic shock do not share identical haemodynamic priorities.</p></div><div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>When a number changes abruptly, check patient first, then signal/device, then physiology. This order prevents both delayed rescue and inappropriate treatment.</p></div><div class='callout warning'><div class='callout-label'>Warning</div><p>If the patient looks worse and the monitor looks reassuring, trust the patient enough to reassess the monitor setup and escalate.</p></div>"}, "equipment": {"title": "Equipment tie-in", "html": "<p><strong>Equipment tie-in</strong> — equipment requires reliable device setup. Trace lines and cables, verify labels, confirm alarm limits, and correlate device output with the patient. The nurse technician lens is to decide whether the device is measuring correctly, delivering therapy correctly, and alarming for the right reason.</p><div class='steps'><div class='step'><div class='step-num'>1</div><div class='step-body'>Confirm identity and baseline: operation, time from theatre, airway/ventilation, rhythm, vasoactives, drains, pacing wires and current targets.</div></div><div class='step'><div class='step-num'>2</div><div class='step-body'>Validate signals: arterial line level/zero/waveform, ECG lead quality, CVP/PA waveform, SpO₂ pleth, EtCO₂, ventilator values and chest drain function.</div></div><div class='step'><div class='step-num'>3</div><div class='step-body'>Interrogate therapy devices: pacing mode/output/sensitivity, defibrillator readiness, IABP timing/trigger/ratio, infusion pump dose and chest drain suction or digital settings.</div></div><div class='step'><div class='step-num'>4</div><div class='step-body'>Document the trend and escalate with exact numbers: MAP, HR/rhythm, drain output per hour, UO, lactate/base excess, vasoactive dose, temperature and the change that worries you.</div></div></div>"}, "targets": {"title": "Targets and numbers", "html": "<div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Target / item</th><th>Specific number</th><th>Action meaning</th></tr></thead><tbody><tr><td>A/C ventilation</td><td>Mandatory and patient-triggered breaths get full support</td><td>Useful early post-op or when control needed.</td></tr><tr><td>PSV/CPAP</td><td>Spontaneous modes requiring drive</td><td>Useful for weaning; watch fatigue and apnea.</td></tr><tr><td>Defibrillator</td><td>VF/pulseless VT: unsynchronised. Organised unstable rhythm: synchronised.</td><td>Confirm sync markers before cardioversion.</td></tr><tr><td>POCT ABG</td><td>No air bubbles, no line contamination, run promptly</td><td>Bad samples create bad treatment.</td></tr><tr><td>IABP console</td><td>Trigger, timing, ratio, augmentation, helium, limb checks</td><td>Timing errors can worsen shock.</td></tr><tr><td>MAP</td><td>65–85 mmHg for many post-op patients; individualise</td><td>Pressure target must be matched to flow and surgical risk.</td></tr><tr><td>Urine output</td><td>>0.5 mL/kg/h</td><td>Low output may be low flow, congestion, obstruction, AKI or hypovolaemia.</td></tr><tr><td>Lactate</td><td><2 mmol/L or falling by 10–20% every 2–4 h</td><td>Rising trend with acidosis/perfusion signs is dangerous.</td></tr><tr><td>K⁺ / Mg²⁺ / iCa²⁺</td><td>K⁺ 4.0–4.5; Mg²⁺ ≥0.8–1.0; iCa²⁺ 1.1–1.3</td><td>Electrical stability, contractility and coagulation.</td></tr></tbody></table></div>"}}}], "survival": {"id": "survival", "name": "Survival Guide", "short": "Survival Guide", "accent": "#B45309", "sections": {"handover": {"title": "Handover to first look", "html": "<p>Your first solo post-op cardiac patient is managed by sequencing. During handover identify the operation, bypass and cross-clamp times, grafts/valves, rhythm, pacing wires, airway plan, vasoactive infusions, drains, bleeding concern, temperature, urine output, lactate, blood products and surgeon-specific instructions.</p><div class='steps'><div class='step'><div class='step-num'>1</div><div class='step-body'>Look at the patient first: colour, chest movement, bleeding, synchrony, agitation and drain behaviour.</div></div><div class='step'><div class='step-num'>2</div><div class='step-body'>Confirm airway, ETT depth, capnography, ventilator mode, FiO₂, PEEP, airway pressures and ABG plan.</div></div><div class='step'><div class='step-num'>3</div><div class='step-body'>Confirm circulation: arterial trace quality, MAP target, rhythm, pacing wires, vasoactive doses, central access and CVP/PA data if present.</div></div><div class='step'><div class='step-num'>4</div><div class='step-body'>Confirm drains: number, suction or digital setting, patency, swing/air leak, current output and escalation threshold.</div></div><div class='step'><div class='step-num'>5</div><div class='step-body'>Confirm renal/metabolic: hourly urine, temperature, lactate, K⁺, Mg²⁺, ionised Ca²⁺ and glucose.</div></div></div>"}, "first15": {"title": "First 15 minutes checklist", "html": "<div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>System</th><th>Check</th><th>Escalate if</th></tr></thead><tbody><tr><td>Airway</td><td>ETT secure, EtCO₂ present, equal chest movement</td><td>Dislodgement, no EtCO₂, high airway pressure with instability.</td></tr><tr><td>Breathing</td><td>Mode, FiO₂, PEEP, SpO₂, EtCO₂, ABG</td><td>SpO₂ <90% despite support, severe acidosis or rising CO₂.</td></tr><tr><td>Circulation</td><td>MAP, waveform, pulse pressure, rhythm, vasoactives</td><td>MAP <60–65, escalating support, narrow pulse pressure.</td></tr><tr><td>Pacing</td><td>Wire identity, box available, capture/sensing if connected</td><td>Heart block, bradycardia with shock, loss of capture.</td></tr><tr><td>Drains</td><td>Patency, suction, output, colour, clots</td><td>Drain >200 mL/h, sudden gush, or sudden stop with shock pattern.</td></tr><tr><td>Temperature</td><td>Core temp and active warming</td><td><35.5–36°C with bleeding/coagulopathy.</td></tr></tbody></table></div>"}, "first4h": {"title": "First 4 hours priorities", "html": "<p>The first four hours are a trend window. Track whether bleeding is settling, lactate is falling, vasoactive requirement is reducing, temperature is normalising, urine output is adequate and rhythm is stable.</p><div class='steps'><div class='step'><div class='step-num'>1</div><div class='step-body'>Document drain and urine output at least hourly early post-op.</div></div><div class='step'><div class='step-num'>2</div><div class='step-body'>Repeat ABG/lactate/electrolytes/coagulation as clinically indicated.</div></div><div class='step'><div class='step-num'>3</div><div class='step-body'>Correct K⁺ to 4.0–4.5, Mg²⁺ to high-normal and ionised Ca²⁺ to 1.1–1.3 mmol/L.</div></div><div class='step'><div class='step-num'>4</div><div class='step-body'>Warm actively if cold; hypothermia worsens bleeding and delays extubation.</div></div><div class='step'><div class='step-num'>5</div><div class='step-body'>Escalate with exact trend: operation, time from theatre, MAP, rhythm, vasoactives, drains, UO, lactate/base excess and your concern.</div></div></div><div class='callout pearl'><div class='callout-label'>Clinical Pearl</div><p>A falling drain output with rising CVP, falling MAP and narrowing pulse pressure is not reassuring. It is a tamponade pattern until disproven.</p></div>"}, "extubation": {"title": "Extubation pathway", "html": "<p>Extubation readiness requires ventilatory, haemodynamic, neurological and surgical readiness. A patient can pass a breathing number and still be unsafe if bleeding, shock, hypothermia, agitation or airway protection is not controlled.</p><div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Domain</th><th>Usually ready</th><th>Not ready</th></tr></thead><tbody><tr><td>Oxygenation</td><td>FiO₂ ≤0.4–0.5, PEEP 5–8, target SpO₂ met</td><td>Refractory hypoxia, pneumothorax, pulmonary oedema.</td></tr><tr><td>Ventilation</td><td>RR <30, RSBI <105, pH >7.30–7.35</td><td>Rising CO₂, weak cough, exhaustion, severe acidosis.</td></tr><tr><td>Haemodynamics</td><td>Stable MAP, no escalating pressors, rhythm controlled</td><td>LCOS, tamponade concern, uncontrolled AF/VT.</td></tr><tr><td>Neurology</td><td>Awake enough, follows commands, protects airway</td><td>Delayed wake, stroke concern, severe agitation.</td></tr><tr><td>Surgical</td><td>Bleeding controlled, temp improving, pain plan</td><td>High drain output, hypothermia, uncontrolled pain.</td></tr></tbody></table></div>"}, "escalation": {"title": "Escalation tiers", "html": "<div class='tier tier1'><strong>Tier 1 — immediate emergency escalation:</strong> cardiac arrest, VF/pulseless VT, massive bleeding, suspected tamponade with shock, airway loss, severe refractory hypoxia, loss of pacing capture in a dependent patient, new major neurological deficit, or IABP/ECMO/VAD critical failure.</div><div class='tier tier2'><strong>Tier 2 — urgent senior review:</strong> MAP <65 despite increasing support, CI <2.2 with hypoperfusion, lactate rising, UO <0.5 mL/kg/h for 2 hours, persistent drain output >100–150 mL/h, new AF with instability, sustained VT, worsening acidosis or escalating oxygen/ventilation requirement.</div><div class='tier tier3'><strong>Tier 3 — early problem solving:</strong> mild hypotension responding to small titration, correctable electrolyte abnormality, borderline urine output with stable perfusion, moderate pain, early atelectasis or equipment signal uncertainty.</div>"}}}, "quiz": [{"domain": 1, "difficulty": "Bedside Basics", "q": "MAP is 75 on noradrenaline, but lactate is rising and urine output is 10 mL/h. Best interpretation?", "options": ["Perfusion is definitely adequate", "Low cardiac output may exist despite acceptable pressure", "The patient only needs diuresis", "Ignore lactate"], "answer": 1, "explanation": "MAP is pressure, not flow. Lactate and urine output suggest delivery/perfusion problems."}, {"domain": 1, "difficulty": "Clinical Reasoning", "q": "A high CVP with hypotension after cardiac surgery most strongly prompts assessment for what?", "options": ["Tamponade/RV failure/congestion pattern", "Simple dehydration only", "Normal recovery", "Pure hypertension"], "answer": 0, "explanation": "High right-sided pressure plus shock suggests obstruction, RV failure or congestion, not routine fluid need."}, {"domain": 1, "difficulty": "Expert Level", "q": "Which factor most increases oxygen delivery when SpO₂ is already normal?", "options": ["More FiO₂ only", "Cardiac output and haemoglobin", "More PEEP in all patients", "Less monitoring"], "answer": 1, "explanation": "DO₂ is driven mainly by CO and Hb-bound oxygen once saturation is adequate."}, {"domain": 2, "difficulty": "Bedside Basics", "q": "A transducer 10 cm below the heart reads how?", "options": ["Falsely high by about 7.4 mmHg", "Falsely low by about 7.4 mmHg", "No change", "Only HR changes"], "answer": 0, "explanation": "Below heart adds hydrostatic pressure."}, {"domain": 2, "difficulty": "Clinical Reasoning", "q": "Slurred arterial upstroke and absent notch suggests what?", "options": ["Overdamping", "Underdamping", "Perfect system", "VF"], "answer": 0, "explanation": "Overdamping blunts the signal and may under-read systolic pressure."}, {"domain": 2, "difficulty": "Expert Level", "q": "Absent CVP a waves are typical in which rhythm?", "options": ["Atrial fibrillation", "Sinus rhythm", "First-degree block", "Sinus bradycardia"], "answer": 0, "explanation": "A waves require organised atrial contraction."}, {"domain": 3, "difficulty": "Bedside Basics", "q": "VF with no pulse requires what?", "options": ["Synchronised cardioversion", "Unsynchronised defibrillation and CPR", "Adenosine", "Wait for 12-lead"], "answer": 1, "explanation": "VF/pulseless VT requires immediate defibrillation."}, {"domain": 3, "difficulty": "Clinical Reasoning", "q": "Post-op AF can cause hypotension because of what?", "options": ["Loss of atrial kick and shorter filling time", "Improved LV filling", "Lower oxygen demand only", "Higher haemoglobin"], "answer": 0, "explanation": "Stiff ventricles often depend on atrial contribution."}, {"domain": 3, "difficulty": "Expert Level", "q": "Falling drain output with rising CVP and falling MAP suggests what?", "options": ["Blocked drain with tamponade risk", "Normal recovery", "Hyperkalaemia only", "Overdamped arterial line only"], "answer": 0, "explanation": "Blood may be accumulating rather than draining."}, {"domain": 4, "difficulty": "Bedside Basics", "q": "Pacing spike plus arterial pulse confirms what?", "options": ["Mechanical capture", "Oversensing", "No capture", "Undersensing"], "answer": 0, "explanation": "Mechanical capture is electrical depolarisation with mechanical output."}, {"domain": 4, "difficulty": "Clinical Reasoning", "q": "Pacer fires despite native QRS complexes. This is what?", "options": ["Undersensing", "Oversensing", "Capture", "Normal DDD always"], "answer": 0, "explanation": "The pacer is failing to see intrinsic activity."}, {"domain": 4, "difficulty": "Expert Level", "q": "Late IABP deflation does what?", "options": ["Increases LV afterload", "Reduces afterload perfectly", "Has no effect", "Treats VF"], "answer": 0, "explanation": "The LV ejects against an inflated balloon."}, {"domain": 5, "difficulty": "Bedside Basics", "q": "Why do CPB patients bleed?", "options": ["Platelet dysfunction, haemodilution, factor consumption, hypothermia and heparin effects", "Because coagulation is always normal", "Only because of aspirin", "Because calcium is irrelevant"], "answer": 0, "explanation": "Post-CPB coagulopathy is mixed."}, {"domain": 5, "difficulty": "Clinical Reasoning", "q": "Warm hypotension with low SVR after CPB is most consistent with what?", "options": ["Vasoplegia", "Tamponade only", "Tension pneumothorax only", "Complete heart block"], "answer": 0, "explanation": "CPB vasoplegia is distributive low-SVR physiology."}, {"domain": 5, "difficulty": "Expert Level", "q": "After aortic surgery, why avoid hypertension?", "options": ["It stresses suture lines and repair sites", "It improves all grafts", "It prevents bleeding always", "It removes need for analgesia"], "answer": 0, "explanation": "Aortic repairs often need anti-impulse pressure control."}, {"domain": 6, "difficulty": "Bedside Basics", "q": "Which drug primarily raises SVR/MAP?", "options": ["Noradrenaline", "Clopidogrel", "Propofol", "Furosemide"], "answer": 0, "explanation": "Noradrenaline is an α-predominant vasopressor."}, {"domain": 6, "difficulty": "Clinical Reasoning", "q": "Milrinone helps RV failure partly by doing what?", "options": ["Lowering PVR and improving inotropy/lusitropy", "Increasing PVR", "Reversing heparin", "Blocking calcium"], "answer": 0, "explanation": "PDE-3 inhibition improves contractility/relaxation and reduces pulmonary vascular tone."}, {"domain": 6, "difficulty": "Expert Level", "q": "Low clot strength on TEG/ROTEM points toward what therapies?", "options": ["Platelet/fibrinogen assessment and replacement", "Only potassium", "Only more FiO₂", "Only sedation"], "answer": 0, "explanation": "Clot amplitude is driven by platelets and fibrinogen/fibrin."}, {"domain": 7, "difficulty": "Bedside Basics", "q": "Routine aggressive drain stripping is discouraged because it can do what?", "options": ["Generate high negative pressure without reliable benefit", "Prevent all tamponade", "Replace monitoring", "Improve oxygenation"], "answer": 0, "explanation": "It can injure tissue and does not reliably prevent blockage."}, {"domain": 7, "difficulty": "Clinical Reasoning", "q": "UO is low with CVP 18 and falling MAP. What should you avoid assuming?", "options": ["That more fluid is automatically correct", "That escalation is needed", "That congestion can impair kidneys", "That tamponade/RV failure is possible"], "answer": 0, "explanation": "High CVP oliguria may be congestion or obstruction, not fluid deficit."}, {"domain": 7, "difficulty": "Expert Level", "q": "Acceptable SpO₂ but weak cough, tachypnoea and rising CO₂ means what?", "options": ["Extubation failure risk", "Perfect readiness", "No concern", "Only pulse ox problem"], "answer": 0, "explanation": "Ventilatory failure and airway protection matter beyond saturation."}, {"domain": 8, "difficulty": "Bedside Basics", "q": "RSBI equals what?", "options": ["RR divided by tidal volume in litres", "MAP divided by HR", "PEEP divided by FiO₂", "Minute volume divided by lactate"], "answer": 0, "explanation": "RSBI = respiratory rate / tidal volume in litres."}, {"domain": 8, "difficulty": "Clinical Reasoning", "q": "High airway pressure plus sudden hypotension after cardiac surgery should raise concern for what?", "options": ["Pneumothorax, obstruction, bronchospasm or acute cardiopulmonary deterioration", "Normal weaning", "Improved compliance", "No issue"], "answer": 0, "explanation": "This pattern may be life-threatening and needs immediate assessment."}, {"domain": 8, "difficulty": "Expert Level", "q": "A critical potassium from a line running potassium with unchanged ECG should prompt what?", "options": ["Repeat clean sample while assessing patient", "Ignore potassium forever", "Treat as definite only", "Turn off monitor"], "answer": 0, "explanation": "Line contamination is plausible; verify urgently without dismissing risk."}], "rapid": {"vasoactive": "<div class='table-wrap'><table class='clinical-table drug-table'><thead><tr><th>Drug</th><th>Class / dose range</th><th>Haemodynamic effect</th><th>Nursing considerations</th></tr></thead><tbody><tr><td>Noradrenaline</td><td>α/β vasopressor; 0.02–1 mcg/kg/min</td><td>↑SVR and MAP with mild β1 effect</td><td>Central line preferred; watch excessive afterload, digital ischaemia, extravasation.</td></tr><tr><td>Adrenaline</td><td>Inopressor; 0.01–0.5 mcg/kg/min</td><td>↑contractility, ↑HR, ↑MAP</td><td>Raises lactate/glucose; arrhythmia and myocardial oxygen demand risk.</td></tr><tr><td>Dobutamine</td><td>β1 inotrope; 2–20 mcg/kg/min</td><td>↑contractility; may ↓SVR</td><td>May drop BP; watch AF/VT and tachycardia.</td></tr><tr><td>Milrinone</td><td>PDE-3 inhibitor; 0.125–0.75 mcg/kg/min</td><td>↑inotropy/lusitropy; ↓PVR/SVR</td><td>Useful RV failure; hypotension; reduce in renal impairment.</td></tr><tr><td>Vasopressin</td><td>V1 vasopressor; 0.01–0.04 units/min</td><td>↑SVR in vasoplegia</td><td>Watch ischaemia and low-flow states.</td></tr><tr><td>Levosimendan</td><td>Calcium sensitiser; unit-specific dosing</td><td>↑contractility with vasodilation</td><td>Long effect; hypotension can persist.</td></tr><tr><td>GTN</td><td>Nitrate; 5–200 mcg/min</td><td>Venodilation, coronary dilation</td><td>Headache, hypotension, tolerance.</td></tr><tr><td>SNP</td><td>NO donor; 0.2–10 mcg/kg/min</td><td>Potent arterial/venous dilation</td><td>Cyanide/thiocyanate risk; invasive BP required.</td></tr><tr><td>Metoprolol</td><td>β1 blocker; IV 1–5 mg increments or enteral</td><td>↓HR, ↓contractility</td><td>Avoid in shock, severe brady/block, acute decompensated failure.</td></tr></tbody></table></div>", "electrolytes": "<div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Electrolyte</th><th>Target</th><th>Why</th></tr></thead><tbody><tr><td>K⁺</td><td>4.0–4.5 mmol/L</td><td>Electrical stability, AF/VT prevention.</td></tr><tr><td>Mg²⁺</td><td>≥0.8–1.0 mmol/L</td><td>AF/torsades risk reduction.</td></tr><tr><td>Ionised Ca²⁺</td><td>1.1–1.3 mmol/L</td><td>Contractility and coagulation.</td></tr><tr><td>PO₄</td><td>0.8–1.5 mmol/L</td><td>Respiratory muscle and ATP.</td></tr></tbody></table></div>", "coag": "<div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Item</th><th>Trigger / target</th><th>Meaning</th></tr></thead><tbody><tr><td>Platelets</td><td>>50 ×10⁹/L bleeding; often >100 high-risk</td><td>Clot strength after CPB.</td></tr><tr><td>Fibrinogen</td><td>>1.5–2.0 g/L</td><td>Early determinant of clot firmness.</td></tr><tr><td>FFP</td><td>Bleeding with factor deficiency/prolonged INR/APTT</td><td>Volume load; guide with labs/TEG.</td></tr><tr><td>PCC</td><td>Urgent warfarin/factor reversal context</td><td>Thrombosis risk; protocolised.</td></tr><tr><td>TXA</td><td>Hyperfibrinolysis/bleeding protocol</td><td>Watch seizure/thrombosis risk.</td></tr></tbody></table></div>", "haemo": "<div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Patient type</th><th>MAP / BP</th><th>Key target</th></tr></thead><tbody><tr><td>Post-CABG</td><td>65–85 mmHg</td><td>Avoid hypotension; watch graft ischaemia and bleeding.</td></tr><tr><td>Post-valve</td><td>65–85 mmHg</td><td>Sinus/AV synchrony, preload and conduction.</td></tr><tr><td>Aortic surgery</td><td>Often SBP 100–120 or MAP 65–80</td><td>Avoid hypertension while preserving organ perfusion.</td></tr><tr><td>RV failure</td><td>Often MAP ≥70–75</td><td>Avoid hypoxia, hypercapnia, acidosis; manage PVR.</td></tr><tr><td>LCOS</td><td>MAP ≥65 with flow</td><td>CI >2.2, SvO₂ >60, lactate falling.</td></tr></tbody></table></div>", "normal": "<div class='table-wrap'><table class='clinical-table target-table'><thead><tr><th>Parameter</th><th>Range</th></tr></thead><tbody><tr><td>CI</td><td>2.5–4.0 L/min/m²</td></tr><tr><td>CO</td><td>4–8 L/min</td></tr><tr><td>SVR</td><td>800–1200 dyn·s/cm⁵</td></tr><tr><td>PVR</td><td>20–130 dyn·s/cm⁵</td></tr><tr><td>CVP</td><td>2–6 normal; 6–12 common post-op</td></tr><tr><td>PA</td><td>15–30/4–12 mmHg</td></tr><tr><td>PAOP</td><td>6–12 mmHg</td></tr><tr><td>SvO₂</td><td>60–80%</td></tr><tr><td>UO</td><td>>0.5 mL/kg/h</td></tr></tbody></table></div>"}, "resources": [{"name": "Wellington ICU Drug Manual", "desc": "Searchable online drug manual for medications used in Wellington Regional Hospital ICU. The About page identifies it as the online version of the Wellington ICU Drug Manual.", "url": "https://drug.wellingtonicu.com/"}, {"name": "Wellington ICU Drug Manual PDF", "desc": "Public PDF version available from the Wellington ICU drug site. Confirm local current use before relying on downloaded copies.", "url": "https://drug.wellingtonicu.com/PDF/WellingtonICUDrugManual.pdf"}, {"name": "Life in the Fast Lane", "desc": "Emergency and critical care education.", "url": "https://litfl.com"}, {"name": "LITFL ECG Library", "desc": "ECG rhythm and ischaemia interpretation.", "url": "https://litfl.com/ecg-library/"}, {"name": "LITFL Haemodynamic Monitoring", "desc": "Invasive monitoring explanations.", "url": "https://litfl.com/haemodynamic-monitoring/"}, {"name": "ICU One Pagers", "desc": "High-yield ICU visual learning summaries.", "url": "https://www.icuonepager.com"}, {"name": "The Bottom Line", "desc": "Critical appraisal summaries of ICU trials.", "url": "https://www.thebottomline.org.uk"}, {"name": "Deranged Physiology", "desc": "Detailed ICU physiology explanations.", "url": "https://derangedphysiology.com"}, {"name": "Cardiothoracic Surgery Network", "desc": "Cardiothoracic surgery education and videos.", "url": "https://www.ctsnet.org"}, {"name": "New Zealand Formulary", "desc": "NZ medicine information.", "url": "https://nzf.org.nz"}, {"name": "ANZICS Guidelines", "desc": "Australasian intensive care guidelines.", "url": "https://www.anzics.com.au/guidelines"}]};
const SECTION_KEYS=["abridged","expanded","pearls","equipment","targets"];
const LABELS={abridged:"Abridged",expanded:"Expanded",pearls:"Clinical Pearls",equipment:"Equipment",targets:"Targets & Numbers",handover:"Handover",first15:"First 15 min",first4h:"First 4 h",extubation:"Extubation",escalation:"Escalation"};
const STORE='ct_icu_learning_progress_v1';let state=loadState(),current={type:'dashboard'},quizRun=null,selectedDifficulty='Bedside Basics',selectedDomain='all';
const EXTERNAL_DOMAIN_MANIFESTS={1:'content/domain1/index.json',2:'content/domain2/index.json',3:'content/domain3/index.json'};
const externalDomainCache={};
function loadState(){try{return JSON.parse(localStorage.getItem(STORE))||{reviewed:{},last:{},quizScores:[]}}catch(e){return{reviewed:{},last:{},quizScores:[]}}}
function save(){localStorage.setItem(STORE,JSON.stringify(state));updateProgressUI()}
function dById(id){return DATA.domains.find(d=>String(d.id)===String(id))}
function key(t,id,k){return `${t}:${id}:${k}`}
function reviewed(t,id,k){return !!state.reviewed[key(t,id,k)]}
function mark(t,id,k){state.reviewed[key(t,id,k)]=true;state.last[`${t}:${id}`]=new Date().toLocaleDateString();save();renderCurrent()}
function domainPct(d){return Math.round(SECTION_KEYS.filter(k=>reviewed('domain',d.id,k)).length/5*100)}
function survivalPct(){let ks=Object.keys(DATA.survival.sections);return Math.round(ks.filter(k=>reviewed('survival','survival',k)).length/ks.length*100)}
function totalPct(){let total=DATA.domains.length*5+Object.keys(DATA.survival.sections).length,done=0;DATA.domains.forEach(d=>done+=SECTION_KEYS.filter(k=>reviewed('domain',d.id,k)).length);done+=Object.keys(DATA.survival.sections).filter(k=>reviewed('survival','survival',k)).length;return{done,total,pct:Math.round(done/total*100)}}
function updateProgressUI(){let t=totalPct();overallSide.textContent=t.pct+'%';overallBar.style.width=t.pct+'%';document.querySelectorAll('[data-domain-badge]').forEach(e=>e.textContent=domainPct(dById(e.dataset.domainBadge))+'%');let s=document.querySelector('[data-survival-badge]');if(s)s.textContent=survivalPct()+'%'}
function chrome(title,bc){pageTitle.textContent=title;breadcrumb.textContent=bc;document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.nav===current.type+':'+(current.id||'')))}
function closeMobile(){sidebar.classList.remove('open');mobileBackdrop.classList.remove('show')}
function buildNav(){let h='<div class="nav-label">Curriculum</div>';DATA.domains.forEach(d=>h+=`<button class="nav-item" data-nav="domain:${d.id}" style="--accent:${d.accent}" onclick="goDomain(${d.id})"><span class="nav-main">Domain ${d.id}<br>${d.short}</span><span class="badge" data-domain-badge="${d.id}">0%</span></button>`);h+=`<button class="nav-item" data-nav="survival:" style="--accent:#B45309" onclick="goSurvival()"><span class="nav-main">🟠 Survival Guide</span><span class="badge" data-survival-badge>0%</span></button><div class="nav-label">Tools</div><button class="nav-item" data-nav="rapid:" style="--accent:#0F766E" onclick="goRapid()"><span class="nav-main">⚡ Rapid Reference</span></button><button class="nav-item" data-nav="quiz:" style="--accent:#6D28D9" onclick="goQuiz()"><span class="nav-main">◉ Quiz Mode</span></button><button class="nav-item" data-nav="resources:" style="--accent:#0F766E" onclick="goResources()"><span class="nav-main">↗ Resources</span></button>`;nav.innerHTML=h;updateProgressUI()}

function htmlDecodeLite(v){
  return String(v==null?'':v)
    .replace(/&lt;/gi,'<').replace(/&gt;/gi,'>')
    .replace(/&quot;/gi,'"').replace(/&#39;|&apos;/gi,"'")
    .replace(/&nbsp;/gi,' ').replace(/&amp;/gi,'&');
}
function cleanClinicalText(v){
  let x=htmlDecodeLite(v);
  x=x.replace(/\r\n/g,'\n');
  x=x.replace(/<\s*br\s*\/?\s*>/gi,'\n');
  x=x.replace(/<\s*\/?\s*(h[1-6]|p|div|section|article)[^>]*>/gi,'\n');
  x=x.replace(/<\s*li[^>]*>/gi,'\n• ');
  x=x.replace(/<\s*\/?\s*(ul|ol)[^>]*>/gi,'\n');
  x=x.replace(/<\s*\/?\s*(strong|b)[^>]*>/gi,'');
  x=x.replace(/<\s*\/?\s*(em|i)[^>]*>/gi,'');
  x=x.replace(/<[^>]+>/g,'');
  x=x.replace(/```(?:json|html|text)?/gi,'');
  x=x.replace(/[ \t]+/g,' ');
  x=x.replace(/ *\n */g,'\n');
  x=x.replace(/\n{3,}/g,'\n\n');
  return x.trim();
}
function safeText(v){return cleanClinicalText(v).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function paragraphHtml(v){
  let x=cleanClinicalText(v);
  if(!x)return '';
  return x.split(/\n{2,}/).map(part=>`<p>${safeText(part)}</p>`).join('');
}
function cleanKey(v){return cleanClinicalText(v)}
function contentBlocksToHtml(blocks){
  if(!Array.isArray(blocks))return '';
  return blocks.map(b=>{
    if(!b||typeof b!=='object')return '';
    if(b.type==='paragraph')return paragraphHtml(b.text);
    if(b.type==='heading')return `<h3>${safeText(b.text)}</h3>`;
    if(b.type==='subheading')return `<h4>${safeText(b.text)}</h4>`;
    if(b.type==='keyterm')return `<p><strong>${safeText(b.term)}</strong> — ${safeText(b.definition)}</p>`;
    if(b.type==='pearl')return `<div class="callout"><div class="callout-label">Clinical Pearl</div>${paragraphHtml(b.text)}</div>`;
    if(b.type==='warning')return `<div class="callout warning"><div class="callout-label">Warning</div>${paragraphHtml(b.text)}</div>`;
    if(b.type==='remember')return `<div class="callout remember"><div class="callout-label">Remember</div>${paragraphHtml(b.text)}</div>`;
    if(b.type==='escalation'){
      let cls=String(b.tier||'').includes('1')?'tier1':String(b.tier||'').includes('2')?'tier2':'tier3';
      return `<div class="tier ${cls}"><strong>${safeText(b.tier||'Escalation')}</strong><br>${safeText(b.text)}</div>`;
    }
    if(b.type==='steps')return `<div class="steps">${(b.items||[]).map((x,i)=>`<div class="step"><div class="step-num">${i+1}</div><div>${safeText(x)}</div></div>`).join('')}</div>`;
    if(b.type==='table'||b.type==='targetTable'){
      let target=b.type==='targetTable'?' target-table':'';
      let heads=(b.columns||[]).map(c=>`<th>${safeText(c)}</th>`).join('');
      let rows=(b.rows||[]).map(r=>`<tr>${(r||[]).map(c=>`<td>${safeText(c)}</td>`).join('')}</tr>`).join('');
      return `<div class="table-wrap"><table class="clinical-table${target}"><thead><tr>${heads}</tr></thead><tbody>${rows}</tbody></table></div>`;
    }
    if(typeof b.text==='string')return paragraphHtml(b.text);
    return '';
  }).join('');
}
function sectionToHtml(section){
  if(!section)return '<p class="muted">No content available for this section.</p>';
  if(section.html)return section.html;
  if(Array.isArray(section.content))return contentBlocksToHtml(section.content);
  if(typeof section.content==='string')return paragraphHtml(section.content);
  return '<p class="muted">No content available for this section.</p>';
}

function topicFilenameCandidates(entry){
  const raw=(entry&&entry.file?String(entry.file):'').trim();
  const title=(entry&&entry.title?String(entry.title):'').trim();
  const out=[];
  const push=v=>{if(v&&!out.includes(v))out.push(v)};
  push(raw);
  if(raw){
    push(raw.replace(/-/g,'_'));
    push(raw.replace(/_/g,'-'));
    push(raw.toLowerCase());
  }
  if(title){
    const base=title.toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
    push(base+'.json');
    push(base.replace(/_/g,'-')+'.json');
    if(base.startsWith('the_')){
      push(base.replace(/^the_/,'')+'.json');
      push(base.replace(/^the_/,'').replace(/_/g,'-')+'.json');
    }
  }
  return out;
}
async function fetchTopicWithFallback(base,entry){
  const candidates=topicFilenameCandidates(entry);
  const attempts=[];
  for(const file of candidates){
    try{
      const res=await fetch(base+file,{cache:'no-store'});
      attempts.push(`${file} → ${res.status}`);
      if(res.ok){
        const topic=await res.json();
        topic.file=topic.file||file;
        topic.loadedFile=file;
        topic.title=topic.title||entry.title||file.replace(/\.json$/,'').replace(/[_-]/g,' ');
        return {ok:true,topic,attempts};
      }
    }catch(e){
      attempts.push(`${file} → ${e&&e.message?e.message:'fetch failed'}`);
    }
  }
  return {ok:false,entry,attempts};
}
async function loadExternalDomain(id){
  id=String(id);
  if(externalDomainCache[id])return externalDomainCache[id];
  let manifestPath=EXTERNAL_DOMAIN_MANIFESTS[id];
  if(!manifestPath)return null;
  let manifestResponse=await fetch(manifestPath,{cache:'no-store'});
  if(!manifestResponse.ok)throw new Error(`Could not load ${manifestPath} (${manifestResponse.status}). Confirm the manifest is committed to GitHub at exactly this case-sensitive path.`);
  let manifest=await manifestResponse.json();
  let base=manifestPath.slice(0,manifestPath.lastIndexOf('/')+1);
  let entries=manifest.files||manifest.topics||[];
  if(!Array.isArray(entries))throw new Error(`${manifestPath} must contain a files or topics array.`);
  let normalised=entries.map(e=>typeof e==='string'?{file:e}:e).filter(e=>e&&e.file);
  let topics=[];
  let missing=[];
  for(const entry of normalised){
    const loaded=await fetchTopicWithFallback(base,entry);
    if(loaded.ok){topics.push(loaded.topic)}else{missing.push(loaded)}
  }
  externalDomainCache[id]={manifest,topics,missing,base};
  return externalDomainCache[id];
}

    app.innerHTML=`<section class="card" style="--accent:${d.accent};margin-bottom:16px"><h2 style="color:${d.accent};margin-top:0">Domain ${d.id}: ${safeText(d.name)}</h2><p class="muted">Loaded from <strong>content/domain${d.id}/index.json</strong>. Add new topic files to the folder, then add one line to the manifest.</p><div class="pill-row">${topicButtons}</div>${missingHtml}</section>`+

      `<article class="card content-card" style="--accent:${d.accent}"><div class="section-head"><div><h2>${safeText(s&&s.title?s.title:LABELS[k])}</h2><div class="review-mark">${safeText(topic.title)} · ${safeText(topic.file)}</div></div><button class="secondary ${reviewed('domain',d.id,k)?'reviewed':''}" style="--accent:${d.accent}" onclick="mark('domain','${d.id}','${k}')">${reviewed('domain',d.id,k)?'Reviewed ✓':'Mark as Reviewed'}</button></div><div id="sectionText">${sectionToHtml(s)}</div></article>`;
    updateProgressUI();
  }catch(err){
    document.documentElement.style.setProperty('--accent',d.accent);
    chrome(d.short,`Curriculum > Domain ${d.id}`);
    app.innerHTML=`<section class="card content-card" style="--accent:${d.accent}"><h2 style="color:${d.accent}">Domain ${d.id} content could not be loaded</h2><div class="callout warning"><div class="callout-label">Manifest / path issue</div><p>${safeText(err.message)}</p></div><p>The app expects this file:</p><pre style="white-space:pre-wrap;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:10px;padding:12px">content/domain${d.id}/index.json</pre><p>That manifest should list the JSON topic files in the same folder. This works properly when hosted on GitHub Pages or a local web server. Direct local file preview may still block JSON loading.</p></section>`;
  }
}

function resetAll(){if(confirm('Reset all CT ICU Learning progress and quiz history on this device?')){state={reviewed:{},last:{},quizScores:[]};save();renderDashboard()}}
function strip(h){let d=document.createElement('div');d.innerHTML=h;return d.textContent||''}
function searchIndex(){let out=[];DATA.domains.forEach(d=>Object.entries(d.sections).forEach(([k,s])=>out.push({type:'domain',id:d.id,key:k,title:s.title,domain:`Domain ${d.id}: ${d.short}`,accent:d.accent,text:strip(s.html)})));Object.entries(DATA.survival.sections).forEach(([k,s])=>out.push({type:'survival',id:'survival',key:k,title:s.title,domain:'Survival Guide',accent:'#B45309',text:strip(s.html)}));return out}
const IDX=searchIndex();
function doSearch(term){if(term.length<3){searchResults.innerHTML='<p class="muted">Type at least 3 characters.</p>';return}let esc=term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),re=new RegExp(esc,'ig');let res=IDX.map(x=>{let m=x.text.search(re);if(m<0)return null;let sn=x.text.slice(Math.max(0,m-80),Math.min(x.text.length,m+160)).replace(re,v=>`<span class="highlight">${v}</span>`);return{...x,sn}}).filter(Boolean).slice(0,20);searchResults.innerHTML=res.length?res.map(r=>`<button class="result" onclick="openResult('${r.type}','${r.id}','${r.key}')"><strong>${r.title}</strong> <span class="badge" style="background:${r.accent}">${r.domain}</span><div class="muted">${r.sn}</div></button>`).join(''):'<p class="muted">No results.</p>'}
function openResult(t,id,k){searchOverlay.style.display='none';searchInput.value='';if(t==='domain')goDomain(id,k);else goSurvival(k)}
function renderCurrent(){if(current.type==='dashboard')return renderDashboard();if(current.type==='domain')return renderDomain();if(current.type==='survival')return renderSurvival();if(current.type==='rapid')return renderRapid();if(current.type==='quiz')return renderQuizLanding();if(current.type==='resources')return renderResources()}
searchBtn.onclick=()=>{searchOverlay.style.display='block';searchInput.focus();doSearch('')};searchInput.oninput=e=>doSearch(e.target.value.trim());document.addEventListener('keydown',e=>{if(e.key==='Escape')searchOverlay.style.display='none'});searchOverlay.onclick=e=>{if(e.target===searchOverlay)searchOverlay.style.display='none'};hamburger.onclick=()=>{sidebar.classList.add('open');mobileBackdrop.classList.add('show')};mobileBackdrop.onclick=closeMobile;rapidShortcut.onclick=goRapid;buildNav();renderDashboard();
</script></body></html>
