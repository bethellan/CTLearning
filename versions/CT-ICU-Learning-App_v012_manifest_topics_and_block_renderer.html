<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CT ICU Learning</title>
<style>
  :root {
    --sidebar-bg:#1E2A3A;--sidebar-text:#CBD5E1;--sidebar-active:#2D3F54;
    --sidebar-width:270px;--header-height:56px;--page-bg:#F8FAFC;
    --text-primary:#1E293B;--text-muted:#64748B;--border:#E2E8F0;
    --d1:#2563EB;--d2:#0891B2;--d3:#DC2626;--d4:#7C3AED;
    --d5:#059669;--d6:#D97706;--d7:#DB2777;--d8:#0369A1;
    --survival:#B45309;--rapid:#0F766E;--quiz:#6D28D9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--page-bg);color:var(--text-primary);display:flex;flex-direction:column;height:100vh;overflow:hidden;font-size:15px}
  #header{position:fixed;top:0;left:var(--sidebar-width);right:0;height:var(--header-height);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;z-index:100}
  #breadcrumb{font-size:13px;color:var(--text-muted);flex:1}
  #page-title{font-size:17px;font-weight:600;position:absolute;left:50%;transform:translateX(-50%)}
  #header-actions{display:flex;align-items:center;gap:10px;margin-left:auto}
  #search-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:20px;padding:4px 8px}
  #rapid-btn{background:var(--rapid);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
  #hamburger{display:none;background:none;border:none;cursor:pointer;font-size:22px;color:var(--text-primary);margin-right:8px}
  #sidebar{position:fixed;top:0;left:0;width:var(--sidebar-width);height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;z-index:200;overflow-y:auto}
  #sidebar-title{padding:20px 20px 8px}
  #sidebar-title h1{color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
  #sidebar-title p{color:#94A3B8;font-size:12px;margin-top:2px}
  .nav-section-label{padding:16px 20px 6px;font-size:10px;font-weight:700;letter-spacing:1.2px;color:#64748B;text-transform:uppercase}
  .nav-item{display:flex;align-items:center;padding:10px 20px;cursor:pointer;color:var(--sidebar-text);font-size:13px;font-weight:500;gap:10px;border-left:3px solid transparent;transition:background .15s}
  .nav-item:hover{background:var(--sidebar-active)}
  .nav-item.active{background:var(--sidebar-active);color:#fff}
  .nav-item .badge{margin-left:auto;background:#374151;color:#94A3B8;font-size:10px;font-weight:600;border-radius:10px;padding:1px 7px}
  .nav-item.active .badge{background:rgba(255,255,255,.15);color:#fff}
  .domain-toggle{justify-content:space-between}
  .domain-toggle .left{display:flex;align-items:center;gap:10px}
  .domain-toggle .arrow{font-size:10px;color:#64748B;transition:transform .2s}
  .domain-toggle.open .arrow{transform:rotate(90deg)}
  .subtopic-list{display:none}
  .subtopic-list.open{display:block}
  .subtopic-item{display:block;padding:7px 20px 7px 42px;cursor:pointer;color:#94A3B8;font-size:12px;border-left:3px solid transparent;transition:all .15s}
  .subtopic-item:hover{background:var(--sidebar-active);color:#CBD5E1}
  .subtopic-item.active{color:#fff;font-weight:600}
  #sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid #2D3F54}
  #sidebar-footer p{font-size:11px;color:#64748B;margin-bottom:6px}
  #overall-bar{height:4px;background:#2D3F54;border-radius:2px}
  #overall-fill{height:4px;background:var(--rapid);border-radius:2px;transition:width .3s;width:0%}
  #overall-pct{font-size:11px;color:#94A3B8;margin-top:4px}
  #main{margin-left:var(--sidebar-width);margin-top:var(--header-height);height:calc(100vh - var(--header-height));overflow-y:auto}
  #content-area{max-width:900px;margin:0 auto;padding:32px}
  .welcome-banner{background:var(--sidebar-bg);border-radius:12px;padding:28px 32px;color:#fff;margin-bottom:28px}
  .welcome-banner h2{font-size:20px;font-weight:700;margin-bottom:4px}
  .welcome-banner p{color:#94A3B8;font-size:14px}
  .domain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
  .domain-card{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:box-shadow .2s}
  .domain-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
  .domain-card-bar{height:5px}
  .domain-card-body{padding:16px}
  .domain-card-body h3{font-size:13px;font-weight:700;margin-bottom:2px}
  .domain-card-body p{font-size:11px;color:var(--text-muted);margin-bottom:10px}
  .progress-bar-wrap{height:4px;background:#F1F5F9;border-radius:2px;margin-bottom:8px}
  .progress-bar-fill{height:4px;border-radius:2px;transition:width .3s}
  .domain-card-meta{display:flex;justify-content:space-between;align-items:center}
  .domain-card-meta span{font-size:11px;color:var(--text-muted)}
  .btn-start{font-size:11px;font-weight:600;border:none;border-radius:6px;padding:4px 12px;cursor:pointer;color:#fff}
  .survival-card{background:#fff;border-radius:12px;border:1px solid var(--border);border-left:4px solid var(--survival);padding:20px 24px;cursor:pointer;transition:box-shadow .2s;margin-bottom:20px}
  .survival-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
  .survival-card h3{font-size:15px;font-weight:700;color:var(--survival);margin-bottom:4px}
  .survival-card p{font-size:13px;color:var(--text-muted)}
  .quick-row{display:flex;gap:12px}
  .quick-btn{flex:1;padding:14px;border-radius:10px;border:1px solid var(--border);background:#fff;cursor:pointer;text-align:center;font-size:13px;font-weight:600;transition:all .15s}
  .quick-btn:hover{background:var(--page-bg)}
  .topic-header{margin-bottom:20px}
  .topic-header h2{font-size:22px;font-weight:700;margin-bottom:4px}
  .topic-header p{font-size:13px;color:var(--text-muted)}
  .tab-row{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
  .tab-btn{padding:8px 18px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:#F1F5F9;color:#475569;transition:all .15s}
  .tab-btn.active{color:#fff}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
  .section-header h3{font-size:16px;font-weight:700}
  .review-btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--accent,#2563EB);color:var(--accent,#2563EB);background:transparent;transition:all .2s}
  .review-btn.reviewed{background:var(--accent,#2563EB);color:#fff}
  /* ── CONTENT TYPOGRAPHY ── */
  .topic-content h3{font-size:16px;font-weight:700;margin:22px 0 10px;color:var(--text-primary)}
  .topic-content h4{font-size:14px;font-weight:700;margin:16px 0 8px;color:var(--text-primary)}
  .topic-content p{margin-bottom:12px;line-height:1.8}
  .topic-content ol,.topic-content ul{margin:0 0 12px 22px;line-height:1.8}
  .topic-content li{margin-bottom:6px}
  .topic-content strong{font-weight:700}
  .topic-content table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
  .topic-content th{background:var(--accent,#2563EB);color:#fff;padding:10px 12px;text-align:left;font-weight:600}
  .topic-content td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.6}
  .topic-content tr:nth-child(even) td{background:#F8FAFC}
  /* ── CALLOUT BLOCKS ── */
  .topic-content div.pearl{background:#EFF6FF;border-left:4px solid #3B82F6;padding:14px 18px;border-radius:0 10px 10px 0;margin:14px 0}
  .topic-content div.pearl::before{content:'CLINICAL PEARL';display:block;font-size:10px;font-weight:800;letter-spacing:1.2px;color:#3B82F6;margin-bottom:6px}
  .topic-content div.warning{background:#FEE2E2;border-left:4px solid #DC2626;padding:14px 18px;border-radius:0 10px 10px 0;margin:14px 0}
  .topic-content div.warning::before{content:'⚠ WARNING';display:block;font-size:10px;font-weight:800;letter-spacing:1.2px;color:#DC2626;margin-bottom:6px}
  .topic-content div.reassurance{background:#DCFCE7;border-left:4px solid #16A34A;padding:14px 18px;border-radius:0 10px 10px 0;margin:14px 0}
  .topic-content div.reassurance::before{content:'✓ REMEMBER';display:block;font-size:10px;font-weight:800;letter-spacing:1.2px;color:#16A34A;margin-bottom:6px}
  /* ── SVG DIAGRAMS ── */
  .diagram-wrap{background:#F8FAFC;border:1px solid var(--border);border-radius:12px;padding:20px;margin:20px 0;text-align:center}
  .diagram-wrap svg{max-width:100%;height:auto}
  .diagram-caption{font-size:12px;color:var(--text-muted);margin-top:10px;font-style:italic}
  /* ── LOADING / ERROR ── */
  .loading{text-align:center;padding:60px 20px;color:var(--text-muted)}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--d1);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-box{background:#FEE2E2;border:1px solid #FCA5A5;border-radius:10px;padding:20px;margin:20px 0}
  .error-box h4{color:#991B1B;margin-bottom:8px}
  .error-box p{color:#7F1D1D;font-size:13px;margin:0}
  .info-box{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;padding:14px 18px;margin:16px 0;font-size:13px;color:#1E40AF}
  /* ── SEARCH ── */
  #search-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:500;align-items:flex-start;justify-content:center;padding-top:80px}
  #search-overlay.open{display:flex}
  #search-box{background:#fff;border-radius:12px;width:100%;max-width:640px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
  #search-input{width:100%;padding:18px 20px;font-size:16px;border:none;outline:none;border-bottom:1px solid var(--border)}
  #search-results{max-height:440px;overflow-y:auto}
  .search-result{padding:14px 20px;cursor:pointer;border-bottom:1px solid var(--border)}
  .search-result:hover{background:var(--page-bg)}
  .search-result-domain{font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:4px}
  .search-result-title{font-size:14px;font-weight:600;margin-bottom:3px}
  .search-result-snippet{font-size:12px;color:var(--text-muted)}
  .search-result-snippet mark{background:#FEF08A;border-radius:2px}
  #sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150}
  /* ── RAPID REF ── */
  .rr-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
  .rr-section{background:#fff;border-radius:10px;border:1px solid var(--border);padding:20px}
  .rr-section h3{font-size:14px;font-weight:700;color:var(--rapid);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--rapid)}
  .tier-block{border-radius:8px;padding:14px 18px;margin-bottom:12px}
  .tier-block h4{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  .tier-block ul{margin-left:16px}
  .tier-block li{font-size:13px;margin-bottom:4px}
  .tier1{background:#DC2626;color:#fff}
  .tier2{background:#D97706;color:#fff}
  .tier3{background:#16A34A;color:#fff}
  /* ── RESOURCES ── */
  .resource-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .resource-card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:18px}
  .resource-card h4{font-size:14px;font-weight:700;margin-bottom:6px}
  .resource-card p{font-size:12px;color:var(--text-muted);margin-bottom:12px}
  .resource-card a{display:inline-block;background:var(--rapid);color:#fff;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;text-decoration:none}
  /* ── QUIZ ── */
  .quiz-opt{padding:14px 18px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:10px;cursor:pointer;font-size:14px;line-height:1.5;transition:all .15s;background:#fff}
  .quiz-opt:hover{background:#F8FAFC}
  .quiz-opt.correct{background:#DCFCE7 !important;border-color:#16A34A !important}
  .quiz-opt.wrong{background:#FEE2E2 !important;border-color:#DC2626 !important}
  /* ── MOBILE ── */
  @media(max-width:768px){
    #sidebar{transform:translateX(-100%);transition:transform .25s}
    #sidebar.open{transform:translateX(0)}
    #sidebar-overlay.open{display:block}
    #header{left:0}
    #hamburger{display:block}
    #main{margin-left:0}
    #page-title{display:none}
    .domain-grid{grid-template-columns:1fr}
    .rr-grid{grid-template-columns:1fr}
    .resource-grid{grid-template-columns:1fr}
    #content-area{padding:20px 16px}
    .topic-content table{display:block;overflow-x:auto}
    .tab-row{gap:6px}
    .tab-btn{padding:7px 12px;font-size:12px}
    .quick-row{flex-direction:column}
  }

.diagram-card{background:#F8FAFC;border:1px solid var(--border);border-left:4px solid var(--accent,#2563EB);border-radius:10px;padding:14px 16px;margin:16px 0}
.diagram-label,.block-label{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent,#2563EB);margin-bottom:6px}
.diagram-card h4{margin:0 0 8px 0;color:var(--text-primary)}
.diagram-layout{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:700}
.diagram-card ul{margin:8px 0 0 20px}
.table-scroll{width:100%;overflow-x:auto;margin:14px 0}
.escalation{background:#DC2626;color:white;border-radius:10px;padding:14px 16px;margin:16px 0}
.escalation p{color:white;margin:6px 0 0}
.references-list{display:grid;gap:12px;margin:16px 0}
.reference-item{background:#F8FAFC;border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.reference-item p{margin:6px 0 0}
.reference-item a{color:var(--accent,#2563EB);word-break:break-word}
.step-list li{margin-bottom:10px}

</style>
</head>
<body>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<nav id="sidebar">
  <div id="sidebar-title">
    <h1><span>♥</span> CT ICU Learning</h1>
    <p>Senior Nurse</p>
  </div>
  <div class="nav-section-label">Curriculum</div>
  <div id="domain-nav"></div>
  <div class="nav-section-label">Tools</div>
  <div class="nav-item" onclick="showPage('rapid')" style="border-left-color:var(--rapid)"><span>⚡</span> Rapid Reference</div>
  <div class="nav-item" onclick="showPage('quiz')" style="border-left-color:var(--quiz)"><span>🎯</span> Quiz Mode</div>
  <div class="nav-item" onclick="showPage('resources')" style="border-left-color:#64748B"><span>🔗</span> Resources</div>
  <div id="sidebar-footer">
    <p>Overall Progress</p>
    <div id="overall-bar"><div id="overall-fill"></div></div>
    <div id="overall-pct">0% complete</div>
  </div>
</nav>

<header id="header">
  <button id="hamburger" onclick="toggleSidebar()">☰</button>
  <div id="breadcrumb">Dashboard</div>
  <div id="page-title">CT ICU Learning</div>
  <div id="header-actions">
    <button id="search-btn" onclick="openSearch()">🔍</button>
    <button id="rapid-btn" onclick="showPage('rapid')">⚡ Rapid Reference</button>
  </div>
</header>

<main id="main">
  <div id="content-area">
    <div class="loading"><div class="spinner"></div><p>Loading curriculum…</p></div>
  </div>
</main>

<div id="search-overlay" onclick="handleSearchOverlayClick(event)">
  <div id="search-box">
    <input id="search-input" type="text" placeholder="Search all content…" oninput="runSearch(this.value)">
    <div id="search-results"></div>
  </div>
</div>

<script>
// ── DOMAIN CONFIG ─────────────────────────────────────────────────────────────
const DOMAINS=[
  {id:'domain1',label:'Domain 1',name:'Physiology',colour:'#2563EB'},
  {id:'domain2',label:'Domain 2',name:'Monitoring',colour:'#0891B2'},
  {id:'domain3',label:'Domain 3',name:'Rhythms',colour:'#DC2626'},
  {id:'domain4',label:'Domain 4',name:'Devices',colour:'#7C3AED'},
  {id:'domain5',label:'Domain 5',name:'Surgery',colour:'#059669'},
  {id:'domain6',label:'Domain 6',name:'Pharmacology',colour:'#D97706'},
  {id:'domain7',label:'Domain 7',name:'Post-op Care',colour:'#DB2777'},
  {id:'domain8',label:'Domain 8',name:'Equipment',colour:'#0369A1'},
];
const TABS=['abridged','expanded','pearls','equipment','targets'];
const TAB_LABELS={abridged:'Abridged',expanded:'Expanded',pearls:'Clinical Pearls',equipment:'Equipment',targets:'Targets & Numbers'};

// ── STATE ─────────────────────────────────────────────────────────────────────
let domainFiles={};
let domainTopicMeta={};
let loadedContent={};
let survivalFiles=[];
let currentTopic=null;
let currentTab='abridged';
let progress=JSON.parse(localStorage.getItem('cticu_v2')||'{}');
let openDomains=new Set(['domain1']);
let searchIndex=[];

// ── BOOT ──────────────────────────────────────────────────────────────────────
async function boot(){
  await loadManifests();
  await loadAllContent();
  buildSidebarNav();
  buildSearchIndex();
  showDashboard();
}

function manifestEntries(manifest){
  const raw=manifest.topics||manifest.files||[];
  return raw.map(item=>{
    if(typeof item==='string') return {file:item,title:fileToTitle(item),id:item.replace(/\.json$/,'')};
    return {
      file:item.file,
      title:item.title||fileToTitle(item.file||''),
      id:item.id||(item.file||'').replace(/\.json$/,'')
    };
  }).filter(item=>item.file);
}

async function loadManifests(){
  const tasks=DOMAINS.map(async d=>{
    try{
      const r=await fetch(`content/${d.id}/index.json`);
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      const m=await r.json();
      const entries=manifestEntries(m);
      domainFiles[d.id]=entries.map(e=>e.file);
      domainTopicMeta[d.id]={};
      entries.forEach(e=>{domainTopicMeta[d.id][e.file]=e;});
    }catch(err){
      console.warn(`Could not load content/${d.id}/index.json`,err);
      domainFiles[d.id]=[];
      domainTopicMeta[d.id]={};
    }
  });
  tasks.push((async()=>{
    try{
      const r=await fetch('content/survival/index.json');
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      const m=await r.json();
      const entries=manifestEntries(m);
      survivalFiles=entries.map(e=>e.file);
      domainTopicMeta.survival={};
      entries.forEach(e=>{domainTopicMeta.survival[e.file]=e;});
    }catch(err){
      survivalFiles=[];
      domainTopicMeta.survival={};
    }
  })());
  await Promise.all(tasks);
}

async function loadAllContent(){
  const tasks=[];
  for(const d of DOMAINS){
    for(const file of (domainFiles[d.id]||[])){
      const key=`${d.id}/${file}`;
      tasks.push(fetch(`content/${d.id}/${file}`)
        .then(r=>{if(!r.ok)throw new Error();return r.json();})
        .then(data=>{loadedContent[key]=data;})
        .catch(()=>{loadedContent[key]=null;}));
    }
  }
  for(const file of survivalFiles){
    const key=`survival/${file}`;
    tasks.push(fetch(`content/survival/${file}`)
      .then(r=>{if(!r.ok)throw new Error();return r.json();})
      .then(data=>{loadedContent[key]=data;})
      .catch(()=>{loadedContent[key]=null;}));
  }
  await Promise.all(tasks);
}

// ── CONTENT NORMALISER ────────────────────────────────────────────────────────
// Handles both HTML strings AND legacy list-of-dicts format gracefully
function escapeText(value){
  return String(value ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function renderTableBlock(item,extraClass=''){
  const cols=item.columns||item.headers||[];
  const rows=item.rows||[];
  const cap=item.caption||item.title||item.heading||'';
  let out=cap?`<h4>${escapeText(cap)}</h4>`:'';
  out+=`<div class="table-scroll"><table class="${extraClass}"><thead><tr>${cols.map(c=>`<th>${escapeText(c)}</th>`).join('')}</tr></thead><tbody>`;
  rows.forEach(row=>{
    const cells=Array.isArray(row)?row:Object.values(row||{});
    out+=`<tr>${cells.map(c=>`<td>${escapeText(c)}</td>`).join('')}</tr>`;
  });
  out+='</tbody></table></div>';
  return out;
}

function renderDiagramBlock(item){
  const elements=item.elements||[];
  const points=item.teachingPoints||item.teaching_points||[];
  return `<div class="diagram-card">
    <div class="diagram-label">Diagram / illustration</div>
    <h4>${escapeText(item.title||'Clinical diagram')}</h4>
    ${item.layout?`<p class="diagram-layout">${escapeText(item.layout)}</p>`:''}
    ${item.description?`<p>${escapeText(item.description)}</p>`:''}
    ${elements.length?`<div class="diagram-elements"><strong>Elements:</strong><ul>${elements.map(e=>`<li>${escapeText(e)}</li>`).join('')}</ul></div>`:''}
    ${points.length?`<div class="diagram-points"><strong>Teaching points:</strong><ul>${points.map(p=>`<li>${escapeText(p)}</li>`).join('')}</ul></div>`:''}
  </div>`;
}

// Handles HTML strings, current block JSON, and older block variants.
function normaliseContent(raw){
  if(typeof raw==='string') return raw;
  if(!Array.isArray(raw)) return '';
  return raw.map(item=>{
    if(!item || typeof item!=='object') return `<p>${escapeText(item)}</p>`;
    const t=item.type||'paragraph';
    if(t==='heading') return `<h3>${escapeText(item.text||'')}</h3>`;
    if(t==='subheading') return `<h4>${escapeText(item.text||'')}</h4>`;
    if(t==='paragraph') return `<p>${escapeText(item.text||'')}</p>`;
    if(t==='keyterm') return `<p><strong>${escapeText(item.term||'')}</strong> — ${escapeText(item.definition||'')}</p>`;
    if(t==='warning') return `<div class="warning"><div class="block-label">Warning</div><p>${escapeText(item.text||'')}</p></div>`;
    if(t==='remember'||t==='reassurance') return `<div class="reassurance"><div class="block-label">Remember</div><p>${escapeText(item.text||'')}</p></div>`;
    if(t==='pearl') return `<div class="pearl"><div class="block-label">Clinical Pearl</div><p>${escapeText(item.text||'')}</p></div>`;
    if(t==='escalation') return `<div class="escalation"><strong>${escapeText(item.tier||'Escalation')}</strong><p>${escapeText(item.text||'')}</p></div>`;
    if(t==='diagram') return renderDiagramBlock(item);
    if(t==='steps'||t==='numberedList'||t==='stepList'){
      const items=(item.items||item.steps||[]);
      return '<ol class="step-list">'+items.map((s,i)=>{
        if(typeof s==='string') return `<li>${escapeText(s)}</li>`;
        const step=s.step||s.text||s.title||`Step ${i+1}`;
        const detail=s.detail||s.description||'';
        return `<li>${detail?`<strong>${escapeText(step)}</strong> — ${escapeText(detail)}`:escapeText(step)}</li>`;
      }).join('')+'</ol>';
    }
    if(t==='bulletList'){
      return '<ul>'+(item.items||[]).map(s=>{
        if(typeof s==='string') return `<li>${escapeText(s)}</li>`;
        return `<li>${escapeText(s.text||s.item||JSON.stringify(s))}</li>`;
      }).join('')+'</ul>';
    }
    if(t==='table') return renderTableBlock(item);
    if(t==='targetTable') return renderTableBlock(item,'target-table');
    if(t==='comparisonTable') return renderTableBlock(item);
    if(t==='tierList'){
      return (item.tiers||[]).map(tier=>`<h4>${escapeText(tier.label||'')}</h4><ul>${(tier.items||[]).map(i=>`<li>${escapeText(i)}</li>`).join('')}</ul>`).join('');
    }
    const text=item.text||item.content||'';
    return text?`<p>${escapeText(text)}</p>`:'';
  }).join('\n');
}

function renderTopicExtras(data,tab){
  let html='';
  if(tab==='equipment' && Array.isArray(data.diagrams) && data.diagrams.length){
    html+='<h3>Topic diagrams and illustration briefs</h3>';
    html+=data.diagrams.map(d=>renderDiagramBlock(d)).join('');
  }
  if(tab==='targets' && Array.isArray(data.references) && data.references.length){
    html+='<h3>References used for this topic</h3><div class="references-list">';
    html+=data.references.map(r=>{
      const source=escapeText(r.source||r.name||'Reference');
      const title=escapeText(r.title||'');
      const url=escapeText(r.url||'');
      const support=escapeText(r.supports||r.whatItSupports||r.note||'');
      return `<div class="reference-item"><strong>${source}</strong>${title?` — ${title}`:''}${support?`<p>${support}</p>`:''}${url?`<p><a href="${url}" target="_blank" rel="noopener">${url}</a></p>`:''}</div>`;
    }).join('');
    html+='</div>';
  }
  if(tab==='targets' && Array.isArray(data.quiz) && data.quiz.length){
    html+=`<h3>Quiz questions available</h3><p>${data.quiz.length} quiz questions from this topic are available in Quiz Mode.</p>`;
  }
  return html;
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function buildSidebarNav(){
  const nav=document.getElementById('domain-nav');
  nav.innerHTML='';
  for(const d of DOMAINS){
    const files=domainFiles[d.id]||[];
    const pct=getDomainProgress(d.id);
    const hasFiles=files.length>0;
    const isOpen=openDomains.has(d.id);
    const toggle=document.createElement('div');
    toggle.className=`nav-item domain-toggle${isOpen&&hasFiles?' open':''}`;
    toggle.style.borderLeftColor=d.colour;
    toggle.innerHTML=`<div class="left"><span style="width:8px;height:8px;border-radius:50%;background:${d.colour};display:inline-block"></span><span>${d.label} — ${d.name}</span></div><div style="display:flex;align-items:center;gap:8px"><span class="badge">${pct}%</span>${hasFiles?'<span class="arrow">▶</span>':''}</div>`;
    if(hasFiles){
      const subList=document.createElement('div');
      subList.className=`subtopic-list${isOpen?' open':''}`;
      toggle.onclick=()=>{
        if(openDomains.has(d.id)){openDomains.delete(d.id);toggle.classList.remove('open');subList.classList.remove('open');}
        else{openDomains.add(d.id);toggle.classList.add('open');subList.classList.add('open');}
      };
      for(const file of files){
        const key=`${d.id}/${file}`;
        const data=loadedContent[key];
        const label=data?data.title:fileToTitle(file);
        const item=document.createElement('div');
        item.className='subtopic-item';
        item.id=`nav-${key.replace(/[/.]/g,'-')}`;
        item.textContent=label;
        item.onclick=()=>{closeSidebar();loadTopic(d,file);};
        subList.appendChild(item);
      }
      nav.appendChild(toggle);
      nav.appendChild(subList);
    }else{
      toggle.onclick=()=>{closeSidebar();showComingSoon(d);};
      nav.appendChild(toggle);
    }
  }
  // Survival guide
  const sg=document.createElement('div');
  sg.className='nav-item';
  sg.style.borderLeftColor='var(--survival)';
  if(survivalFiles.length){
    const sgD={id:'survival',label:'Survival Guide',name:'Survival Guide',colour:'#B45309'};
    const pct=getDomainProgress('survival');
    sg.innerHTML=`<span>🆘</span> Survival Guide <span class="badge">${pct}%</span> <span class="arrow" style="font-size:10px;color:#64748B">▶</span>`;
    const sgSub=document.createElement('div');
    sgSub.className='subtopic-list';
    for(const file of survivalFiles){
      const key=`survival/${file}`;
      const data=loadedContent[key];
      const item=document.createElement('div');
      item.className='subtopic-item';
      item.id=`nav-${key.replace(/[/.]/g,'-')}`;
      item.textContent=data?data.title:fileToTitle(file);
      item.onclick=()=>{closeSidebar();loadTopic(sgD,file);};
      sgSub.appendChild(item);
    }
    let sgOpen=false;
    sg.onclick=()=>{sgOpen=!sgOpen;sgSub.classList.toggle('open',sgOpen);sg.querySelector('.arrow').style.transform=sgOpen?'rotate(90deg)':'';};
    nav.appendChild(sg);nav.appendChild(sgSub);
  }else{
    sg.innerHTML=`<span>🆘</span> Survival Guide <span class="badge">Soon</span>`;
    sg.onclick=()=>showComingSoon({name:'Survival Guide'});
    nav.appendChild(sg);
  }
  updateOverallProgress();
}

function fileToTitle(f){
  return f.replace('.json','').replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase())
    .replace(/\bLvedp\b/,'LVEDP').replace(/\bSvr\b/,'SVR').replace(/\bPvr\b/,'PVR')
    .replace(/\bDo2\b/,'DO2').replace(/\bVo2\b/,'VO2').replace(/\bCvp\b/,'CVP')
    .replace(/\bPa\b/,'PA').replace(/\bEcg\b/,'ECG').replace(/\bIabp\b/,'IABP')
    .replace(/\bCabg\b/,'CABG').replace(/\bTavi\b/,'TAVI').replace(/\bAf\b/,'AF')
    .replace(/\bVt\b/,'VT').replace(/\bVf\b/,'VF').replace(/\bMi\b/,'MI')
    .replace(/\bNstemi\b/,'NSTEMI').replace(/\bStemi\b/,'STEMI');
}

function loadFirstTopic(domainId){
  const files=domainId==='survival'?survivalFiles:(domainFiles[domainId]||[]);
  if(!files.length) return;
  const d=domainId==='survival'?{id:'survival',label:'Survival Guide',name:'Survival Guide',colour:'#B45309'}:DOMAINS.find(x=>x.id===domainId);
  loadTopic(d,files[0]);
}

// ── TOPIC PAGE ────────────────────────────────────────────────────────────────
function loadTopic(domain,file){
  const key=`${domain.id}/${file}`;
  currentTopic={domain,file,key};
  currentTab='abridged';
  setAllNavInactive();
  const navEl=document.getElementById(`nav-${key.replace(/[/.]/g,'-')}`);
  if(navEl){navEl.classList.add('active');navEl.scrollIntoView({block:'nearest'});}
  document.getElementById('breadcrumb').textContent=`Curriculum › ${domain.label} › ${(domainTopicMeta[domain.id]&&domainTopicMeta[domain.id][file]?.title)||fileToTitle(file)}`;
  document.getElementById('page-title').textContent=domain.name;
  document.getElementById('content-area').innerHTML=`<div class="loading"><div class="spinner"></div><p>Loading content…</p></div>`;
  const data=loadedContent[key];
  if(!data){
    document.getElementById('content-area').innerHTML=`<div class="error-box"><h4>Content file not found</h4>
      <p>Could not load <code>content/${key}</code>.<br><br>
      Checklist:<br>
      1. File exists at <code>content/${domain.id}/${file}</code><br>
      2. Filename is in <code>content/${domain.id}/index.json</code><br>
      3. Running via local server: <code>python3 -m http.server 8000</code> → open <a href="http://localhost:8000">localhost:8000</a></p></div>`;
    return;
  }
  renderTopic(data,domain,key);
}

function renderTopic(data,domain,key){
  const colour=domain.colour;
  const tabs=TABS.map(t=>`<button class="tab-btn${t===currentTab?' active':''}" id="tab-${t}"
    style="${t===currentTab?`background:${colour};color:#fff`:''}"
    onclick="switchTab('${t}','${key}')">${TAB_LABELS[t]}</button>`).join('');
  document.getElementById('content-area').innerHTML=`
    <div class="topic-header">
      <h2 style="color:${colour}">${data.title||(domainTopicMeta[domain.id]&&domainTopicMeta[domain.id][key.split('/')[1]]?.title)||fileToTitle(key.split('/')[1])}</h2>
      <p>${data.domainName||domain.name}</p>
    </div>
    <div class="tab-row">${tabs}</div>
    <div id="tab-panels"></div>`;
  document.getElementById('content-area').style.setProperty('--accent',colour);
  renderTabPanel(data,domain,key,currentTab);
}

function switchTab(tab,key){
  if(!currentTopic) return;
  currentTab=tab;
  const {domain}=currentTopic;
  TABS.forEach(t=>{
    const btn=document.getElementById(`tab-${t}`);
    if(!btn) return;
    if(t===tab){btn.classList.add('active');btn.style.background=domain.colour;btn.style.color='#fff';}
    else{btn.classList.remove('active');btn.style.background='';btn.style.color='';}
  });
  renderTabPanel(loadedContent[key],domain,key,tab);
}

function renderTabPanel(data,domain,key,tab){
  const colour=domain.colour;
  const isReviewed=!!progress[`${key}__${tab}`];
  const section=data.sections?.[tab]||{};
  const rawContent=section.content||'';
  const htmlContent=normaliseContent(rawContent);

  let html=`<div class="section-header">
    <h3 style="color:${colour}">${TAB_LABELS[tab]}</h3>
    <button class="review-btn${isReviewed?' reviewed':''}" id="review-btn"
      style="--accent:${colour}" onclick="markReviewed('${key}','${tab}','${domain.id}')">
      ${isReviewed?'Reviewed ✓':'Mark as Reviewed'}
    </button></div>
  <div class="topic-content">${htmlContent}`;

  if(tab==='targets'&&section.tables&&section.tables.length){
    for(const tbl of section.tables){
      html+=`<h4 style="margin-top:24px;color:${colour}">${escapeText(tbl.heading||'')}</h4>`;
      html+=`<div class="table-scroll"><table><thead><tr>${(tbl.headers||[]).map(h=>`<th>${escapeText(h)}</th>`).join('')}</tr></thead><tbody>`;
      (tbl.rows||[]).forEach(row=>{html+=`<tr>${row.map(c=>`<td>${escapeText(c)}</td>`).join('')}</tr>`;});
      html+='</tbody></table></div>';
    }
  }

  if(tab==='abridged'&&data.drugs&&data.drugs.length){
    html+=`<h4 style="margin-top:24px;color:${colour}">Drug Reference</h4>
      <div class="table-scroll"><table><thead><tr><th>Drug</th><th>Class</th><th>Dose</th><th>Effect</th><th>Monitoring</th><th>Nursing</th></tr></thead><tbody>`;
    data.drugs.forEach(d=>{
      html+=`<tr><td><strong>${escapeText(d.name||'')}</strong></td><td>${escapeText(d.class||'')}</td><td>${escapeText(d.dose||'')}</td><td>${escapeText(d.haemodynamicEffect||'')}</td><td>${escapeText(d.monitoring||'')}</td><td>${escapeText(d.nursing||'')}</td></tr>`;
    });
    html+='</tbody></table></div>';
  }

  html+=renderTopicExtras(data,tab);
  html+='</div>';
  document.getElementById('tab-panels').innerHTML=html;
}

// ── PROGRESS ──────────────────────────────────────────────────────────────────
function markReviewed(key,tab,domainId){
  progress[`${key}__${tab}`]=Date.now();
  localStorage.setItem('cticu_v2',JSON.stringify(progress));
  const btn=document.getElementById('review-btn');
  if(btn){btn.classList.add('reviewed');btn.textContent='Reviewed ✓';}
  buildSidebarNav();
  updateOverallProgress();
}

function getDomainProgress(domainId){
  const files=domainId==='survival'?survivalFiles:(domainFiles[domainId]||[]);
  if(!files.length) return 0;
  let total=0,done=0;
  files.forEach(file=>{
    const key=`${domainId}/${file}`;
    TABS.forEach(tab=>{total++;if(progress[`${key}__${tab}`])done++;});
  });
  return total?Math.round(done/total*100):0;
}

function updateOverallProgress(){
  let total=0,done=0;
  DOMAINS.forEach(d=>{
    (domainFiles[d.id]||[]).forEach(file=>{
      const key=`${d.id}/${file}`;
      TABS.forEach(tab=>{total++;if(progress[`${key}__${tab}`])done++;});
    });
  });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('overall-fill').style.width=pct+'%';
  document.getElementById('overall-pct').textContent=pct+'% complete';
}

  const allQ=gatherQuestions('all');
  if(!allQ.length){
    document.getElementById('content-area').innerHTML=`<div class="topic-header"><h2 style="color:var(--quiz)">🎯 Quiz Mode</h2></div>
      <div class="info-box">No quiz questions loaded yet. Quiz questions are included automatically from each domain JSON file.</div>`;
    return;
  }
  const levels=['basic','reasoning','expert'];
  document.getElementById('content-area').innerHTML=`
    <div class="topic-header"><h2 style="color:var(--quiz)">🎯 Quiz Mode</h2><p>${allQ.length} questions across your curriculum</p></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px">
      ${levels.map(l=>{
        const c=gatherQuestions(l).length;
        return `<div style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:24px;cursor:pointer;text-align:center"
          onclick="startQuiz('${l}')">
          <div style="font-size:36px;margin-bottom:10px">${l==='basic'?'🟢':l==='reasoning'?'🟡':'🔴'}</div>
          <h3 style="font-size:14px;font-weight:700;margin-bottom:4px;text-transform:capitalize">${l}</h3>
          <p style="font-size:12px;color:var(--text-muted)">${c} question${c!==1?'s':''}</p>
        </div>`;}).join('')}
    </div>
    <button onclick="startQuiz('all')" style="background:var(--quiz);color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">All Questions (${allQ.length})</button>`;
}

function normaliseQuizLevel(q){
  const raw=String(q.level||q.difficulty||'').toLowerCase();
  if(raw.includes('basic')||raw==='bedside') return 'basic';
  if(raw.includes('reason')) return 'reasoning';
  if(raw.includes('expert')) return 'expert';
  return 'basic';
}

function normaliseQuizQuestion(q,d){
  const answerIndex=Number.isInteger(q.correct)?q.correct:Number.isInteger(q.answer)?q.answer:0;
  return {
    question:q.question||'',
    options:q.options||[],
    correct:answerIndex,
    explanation:q.explanation||'',
    level:normaliseQuizLevel(q),
    domainName:d.name,
    domainColour:d.colour
  };
}

function gatherQuestions(level){
  const all=[];
  const domains=[...DOMAINS,{id:'survival',name:'Survival Guide',colour:'#B45309'}];
  for(const d of domains){
    const files=d.id==='survival'?survivalFiles:(domainFiles[d.id]||[]);
    for(const file of files){
      const key=`${d.id}/${file}`;
      const data=loadedContent[key];
      if(!data) continue;
      const qList=Array.isArray(data.quiz)?data.quiz:(Array.isArray(data.quizQuestions)?data.quizQuestions:[]);
      qList.forEach(q=>{
        const nq=normaliseQuizQuestion(q,d);
        if(level==='all'||nq.level===level) all.push({...nq,source:data.title||fileToTitle(file)});
      });
    }
  }
  return all.sort(()=>Math.random()-.5);
}

function startQuiz(level){
  const questions=gatherQuestions(level);
  if(!questions.length){alert('No questions at this level yet.');return;}
  window._quizQ=questions;
  runQuizSession(0,0);
}

function runQuizSession(idx,score){
  const questions=window._quizQ;
  if(idx>=questions.length){showQuizComplete(score,questions.length);return;}
  const q=questions[idx];
  document.getElementById('content-area').innerHTML=`
    <div class="topic-header">
      <h2 style="color:var(--quiz)">🎯 Question ${idx+1} / ${questions.length}</h2>
      <p><span style="background:${q.domainColour};color:#fff;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700">${q.domainName}</span>&nbsp; ${q.source||''}</p>
    </div>
    <div style="background:#fff;border-radius:12px;border:1px solid var(--border);padding:28px;margin-bottom:20px">
      <p style="font-size:16px;font-weight:600;line-height:1.7;margin-bottom:24px">${q.question}</p>
      ${q.options.map((opt,i)=>`<div class="quiz-opt" id="qopt-${i}" onclick="selectAnswer(${i},${q.correct},${idx},${score})">
        <span style="font-weight:700;color:var(--text-muted);margin-right:10px">${String.fromCharCode(65+i)}.</span>${opt}
      </div>`).join('')}
    </div>`;
}

function selectAnswer(chosen,correct,idx,score){
  document.querySelectorAll('.quiz-opt').forEach((el,i)=>{
    el.onclick=null;el.style.cursor='default';
    if(i===correct) el.classList.add('correct');
    else if(i===chosen&&chosen!==correct) el.classList.add('wrong');
  });
  const newScore=score+(chosen===correct?1:0);
  const q=window._quizQ[idx];
  const exp=document.createElement('div');
  exp.style.cssText='background:#EFF6FF;border-left:4px solid #3B82F6;padding:16px 20px;border-radius:0 10px 10px 0;margin-bottom:20px';
  exp.innerHTML=`<div style="font-size:10px;font-weight:800;letter-spacing:1px;color:#3B82F6;margin-bottom:8px">EXPLANATION</div><p style="font-size:14px;line-height:1.75">${q.explanation}</p>`;
  document.getElementById('content-area').appendChild(exp);
  const btn=document.createElement('button');
  btn.textContent=idx+1<window._quizQ.length?'Next Question →':'See Results';
  btn.style.cssText='background:var(--quiz);color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:40px';
  btn.onclick=()=>runQuizSession(idx+1,newScore);
  document.getElementById('content-area').appendChild(btn);
}

function showQuizComplete(score,total){
  const pct=Math.round(score/total*100);
  document.getElementById('content-area').innerHTML=`
    <div style="text-align:center;padding:48px 20px">
      <div style="font-size:64px;margin-bottom:16px">${pct>=80?'🏆':pct>=60?'👍':'📚'}</div>
      <h2 style="font-size:32px;font-weight:700;color:var(--quiz);margin-bottom:8px">${score} / ${total}</h2>
      <p style="font-size:18px;color:var(--text-muted);margin-bottom:12px">${pct}% correct</p>
      <p style="font-size:15px;max-width:480px;margin:0 auto 32px;line-height:1.7">
        ${pct>=80?'Excellent — strong command of this content.':pct>=60?'Good progress. Review challenging topics in the expanded sections.':'Keep working through the expanded sections to build depth.'}
      </p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button onclick="showQuiz()" style="background:var(--quiz);color:#fff;border:none;padding:12px 24px;border-radius:8px;font-weight:600;cursor:pointer">Try Again</button>
        <button onclick="showDashboard()" style="background:var(--page-bg);border:1px solid var(--border);padding:12px 24px;border-radius:8px;font-weight:600;cursor:pointer">Dashboard</button>
      </div>
    </div>`;
}

function showComingSoon(d){
  document.getElementById('breadcrumb').textContent=d.name;
  document.getElementById('content-area').innerHTML=`
    <div style="text-align:center;padding:60px 20px">
      <div style="font-size:48px;margin-bottom:16px">🚧</div>
      <h2 style="font-size:22px;font-weight:700;margin-bottom:12px">${d.name}</h2>
      <p style="color:var(--text-muted);max-width:480px;margin:0 auto 12px;line-height:1.7">Content files not yet added for this domain.</p>
      <div class="info-box" style="max-width:540px;margin:0 auto 24px;text-align:left">
        <strong>To add content:</strong><br>
        1. Extract JSON files from your ChatGPT domain conversation<br>
        2. Save to <code>content/${d.id||'domainX'}/</code><br>
        3. Create or update <code>content/${d.id||'domainX'}/index.json</code> with the filenames<br>
        4. Refresh — files appear automatically
      </div>
      <button onclick="showDashboard()" style="background:var(--d1);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-weight:600;cursor:pointer">Back to Dashboard</button>
    </div>`;

// ── SEARCH ────────────────────────────────────────────────────────────────────
function buildSearchIndex(){
  searchIndex=[];
  const domains=[...DOMAINS,{id:'survival',name:'Survival Guide',colour:'#B45309'}];
  for(const d of domains){
    const files=d.id==='survival'?survivalFiles:(domainFiles[d.id]||[]);
    for(const file of files){
      const key=`${d.id}/${file}`;
      const data=loadedContent[key];
      if(!data) continue;
      TABS.forEach(tab=>{
        const raw=data.sections?.[tab]?.content||'';
        const plain=normaliseContent(raw).replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
        if(plain) searchIndex.push({key,tab,domain:d,file,title:data.title||fileToTitle(file),content:plain});
      });
    }
  }
}

function runSearch(query){
  const el=document.getElementById('search-results');
  if(query.length<3){el.innerHTML='';return;}
  const q=query.toLowerCase();
  const hits=searchIndex.filter(i=>i.content.toLowerCase().includes(q)||i.title.toLowerCase().includes(q)).slice(0,12);
  if(!hits.length){el.innerHTML=`<div style="padding:30px;text-align:center;color:var(--text-muted)">No results for "${query}"</div>`;return;}
  el.innerHTML=hits.map(hit=>{
    const idx=hit.content.toLowerCase().indexOf(q);
    const snippet=hit.content.substring(Math.max(0,idx-60),idx+120);
    const hi=snippet.replace(new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);
    return `<div class="search-result" onclick="closeSearch();loadTopic(${JSON.stringify({id:hit.domain.id,label:hit.domain.label||hit.domain.name,name:hit.domain.name,colour:hit.domain.colour})},'${hit.file}');setTimeout(()=>switchTab('${hit.tab}','${hit.key}'),400)">
      <div class="search-result-domain" style="color:${hit.domain.colour}">${hit.domain.name} — ${TAB_LABELS[hit.tab]}</div>
      <div class="search-result-title">${hit.title}</div>
      <div class="search-result-snippet">…${hi}…</div>
    </div>`;
  }).join('');
}

function openSearch(){document.getElementById('search-overlay').classList.add('open');document.getElementById('search-input').focus();}
function closeSearch(){document.getElementById('search-overlay').classList.remove('open');document.getElementById('search-input').value='';document.getElementById('search-results').innerHTML='';}
function handleSearchOverlayClick(e){if(e.target===document.getElementById('search-overlay'))closeSearch();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSearch();});

// ── MOBILE ────────────────────────────────────────────────────────────────────
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');}
function setAllNavInactive(){document.querySelectorAll('.subtopic-item,.nav-item').forEach(el=>el.classList.remove('active'));}

boot();
</script>
